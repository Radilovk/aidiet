<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Standalone преглед на loading екрана за здравния анализ в NutriPlan.">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#F0FDFA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0A1A1A" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NutriPlan">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512x512.png">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icon-192x192.png">
    <title>Analysis Loading Preview</title>
    <link rel="stylesheet" href="./design-system.css">
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);var c=t==='dark'?'#0A1A1A':'#F0FDFA';document.querySelectorAll('meta[name="theme-color"]').forEach(function(m){m.setAttribute('content',c);});})();</script>
    <style>
        :root {
            --primary-red: #0D9488;
            --primary-red-hover: #0F766E;
            --text-dark: #0F2F2E;
            --text-gray: #6b7280;
            --bg-color: #F0FDFA;
            --input-bg: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(13, 148, 136, 0.1);
            --shadow: 0 10px 30px rgba(13,148,136,0.12);
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-inset-left: env(safe-area-inset-left, 0px);
            --safe-area-inset-right: env(safe-area-inset-right, 0px);
        }

        [data-theme="dark"] {
            --primary-red: #2DD4BF;
            --primary-red-hover: #0D9488;
            --text-dark: #E0F5F0;
            --text-gray: #9ca3af;
            --bg-color: #0A1A1A;
            --input-bg: #1e4545;
            --card-bg: rgba(20, 55, 55, 0.78);
            --glass-border: rgba(45, 212, 191, 0.15);
            --shadow: 0 4px 12px rgba(0,0,0,0.25), 0 0 4px rgba(45,212,191,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100dvh;
            background: radial-gradient(circle at top right, rgba(45, 212, 191, 0.12), transparent 32%), var(--bg-color);
            color: var(--text-dark);
            padding: calc(24px + var(--safe-area-inset-top)) calc(16px + var(--safe-area-inset-right)) calc(24px + var(--safe-area-inset-bottom)) calc(16px + var(--safe-area-inset-left));
        }

        .preview-layout {
            min-height: calc(100dvh - var(--safe-area-inset-top) - var(--safe-area-inset-bottom) - 48px);
            display: grid;
            gap: 16px;
            align-items: start;
        }

        .preview-toolbar {
            width: min(100%, 720px);
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }

        .preview-toolbar-copy h1 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .preview-toolbar-copy p {
            font-size: 0.92rem;
            color: var(--text-gray);
        }

        .toolbar-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .toolbar-btn {
            border: 1px solid var(--glass-border);
            background: rgba(13, 148, 136, 0.08);
            color: var(--text-dark);
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
        }

        .toolbar-btn:hover {
            background: rgba(13, 148, 136, 0.14);
        }

        .preview-frame {
            position: relative;
            width: min(100%, 720px);
            min-height: min(70dvh, 720px);
            margin: 0 auto;
            border-radius: 32px;
            overflow: hidden;
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }

        .loading-screen {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--input-bg);
            border-top-color: var(--primary-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--text-gray);
            text-align: center;
            padding: 0 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            body {
                padding-left: calc(12px + var(--safe-area-inset-left));
                padding-right: calc(12px + var(--safe-area-inset-right));
            }

            .preview-frame {
                min-height: min(72dvh, 640px);
                border-radius: 24px;
            }

            .preview-toolbar {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <main class="preview-layout">
        <section class="preview-toolbar">
            <div class="preview-toolbar-copy">
                <h1>Standalone preview за analysis loader</h1>
                <p>Това е отделен HTML за тест и редакция на екрана преди analysis.html.</p>
            </div>
            <div class="toolbar-actions">
                <button type="button" class="toolbar-btn" id="themeToggleBtn">Смени тема</button>
                <button type="button" class="toolbar-btn" id="openAnalysisBtn">Отвори analysis.html</button>
            </div>
        </section>

        <section class="preview-frame" aria-label="Преглед на loading екрана">
            <div class="loading-screen" id="loadingScreen" aria-live="polite" aria-busy="true">
                <div class="loading-spinner"></div>
                <p class="loading-text">Зареждане на анализа...</p>
            </div>
        </section>
    </main>

    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            var color = theme === 'dark' ? '#0A1A1A' : '#F0FDFA';
            document.querySelectorAll('meta[name="theme-color"]').forEach(function(meta) {
                meta.setAttribute('content', color);
            });
        }

        document.getElementById('themeToggleBtn').addEventListener('click', function() {
            var currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        document.getElementById('openAnalysisBtn').addEventListener('click', function() {
            window.location.href = 'analysis.html';
        });
    </script>
</body>
</html>
