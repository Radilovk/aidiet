<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Standalone преглед на loading екрана за здравния анализ в NutriPlan.">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#F0FDFA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0A1A1A" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NutriPlan">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512x512.png">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icon-192x192.png">
    <title>Analysis Loading Preview</title>
    <link rel="stylesheet" href="./design-system.css">
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);var c=t==='dark'?'#0A1A1A':'#F0FDFA';document.querySelectorAll('meta[name="theme-color"]').forEach(function(m){m.setAttribute('content',c);});})();</script>
    <style>
        :root {
            --primary-red: #0D9488;
            --primary-red-hover: #0F766E;
            --text-dark: #0F2F2E;
            --text-gray: #6b7280;
            --bg-color: #F0FDFA;
            --input-bg: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(13, 148, 136, 0.1);
            --shadow: 0 10px 30px rgba(13,148,136,0.12);
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-inset-left: env(safe-area-inset-left, 0px);
            --safe-area-inset-right: env(safe-area-inset-right, 0px);
        }

        [data-theme="dark"] {
            --primary-red: #2DD4BF;
            --primary-red-hover: #0D9488;
            --text-dark: #E0F5F0;
            --text-gray: #9ca3af;
            --bg-color: #0A1A1A;
            --input-bg: #1e4545;
            --card-bg: rgba(20, 55, 55, 0.78);
            --glass-border: rgba(45, 212, 191, 0.15);
            --shadow: 0 4px 12px rgba(0,0,0,0.25), 0 0 4px rgba(45,212,191,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100dvh;
            background: radial-gradient(circle at top right, rgba(45, 212, 191, 0.12), transparent 32%), var(--bg-color);
            color: var(--text-dark);
            padding: calc(24px + var(--safe-area-inset-top)) calc(16px + var(--safe-area-inset-right)) calc(24px + var(--safe-area-inset-bottom)) calc(16px + var(--safe-area-inset-left));
        }

        .preview-layout {
            min-height: calc(100dvh - var(--safe-area-inset-top) - var(--safe-area-inset-bottom) - 48px);
            display: grid;
            gap: 16px;
            align-items: start;
        }

        .preview-toolbar {
            width: min(100%, 720px);
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }

        .preview-toolbar-copy h1 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .preview-toolbar-copy p {
            font-size: 0.92rem;
            color: var(--text-gray);
        }

        .toolbar-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .toolbar-btn {
            border: 1px solid var(--glass-border);
            background: rgba(13, 148, 136, 0.08);
            color: var(--text-dark);
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
        }

        .toolbar-btn:hover {
            background: rgba(13, 148, 136, 0.14);
        }

        .preview-frame {
            position: relative;
            width: min(100%, 720px);
            min-height: min(70dvh, 720px);
            margin: 0 auto;
            border-radius: 32px;
            overflow: hidden;
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }

        .loading-screen {
            position: absolute;
            inset: 0;
            padding: 20px;
            background:
                radial-gradient(circle at 18% 14%, rgba(45, 212, 191, 0.22), transparent 34%),
                radial-gradient(circle at 86% 18%, rgba(59, 130, 246, 0.14), transparent 30%),
                linear-gradient(160deg, rgba(240, 253, 250, 0.98), rgba(204, 251, 241, 0.74));
            display: grid;
            place-items: center;
            z-index: 1;
        }

        [data-theme="dark"] .loading-screen {
            background:
                radial-gradient(circle at 18% 14%, rgba(45, 212, 191, 0.18), transparent 34%),
                radial-gradient(circle at 86% 18%, rgba(96, 165, 250, 0.12), transparent 30%),
                linear-gradient(160deg, #0A1A1A, #102B2B 72%, #081112);
        }

        .loading-card {
            position: relative;
            width: min(100%, 420px);
            padding: clamp(26px, 7vw, 38px) clamp(20px, 6vw, 30px);
            border-radius: 34px;
            text-align: center;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(13, 148, 136, 0.14);
            box-shadow: 0 28px 70px rgba(13, 148, 136, 0.16), inset 0 1px 0 rgba(255,255,255,.72);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            overflow: hidden;
        }

        [data-theme="dark"] .loading-card {
            background: rgba(20, 55, 55, 0.72);
            border-color: rgba(45, 212, 191, 0.18);
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255,255,255,.06);
        }

        .loading-card::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            left: -74px;
            top: -88px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(45,212,191,.28), transparent 68%);
        }

        .loading-orb {
            position: relative;
            width: clamp(104px, 30vw, 128px);
            height: clamp(104px, 30vw, 128px);
            margin: 0 auto 20px;
            display: grid;
            place-items: center;
        }

        .loading-spinner {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 90deg, rgba(13,148,136,.08), var(--primary-red), #99F6E4, rgba(13,148,136,.08));
            mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
            animation: spin 1.35s linear infinite;
        }

        .loading-icon {
            width: clamp(72px, 21vw, 88px);
            height: clamp(72px, 21vw, 88px);
            border-radius: 28px;
            display: grid;
            place-items: center;
            color: var(--primary-red);
            background: linear-gradient(160deg, rgba(255,255,255,.95), rgba(240,253,250,.72));
            border: 1px solid rgba(13,148,136,.15);
            box-shadow: 0 18px 38px rgba(13,148,136,.20), inset 0 1px 0 rgba(255,255,255,.9);
            animation: loadingPulse 1.85s ease-in-out infinite;
        }

        [data-theme="dark"] .loading-icon {
            background: linear-gradient(160deg, rgba(20,55,55,.95), rgba(8,28,30,.86));
            box-shadow: 0 18px 42px rgba(0,0,0,.38), 0 0 26px rgba(45,212,191,.16), inset 0 1px 0 rgba(255,255,255,.08);
        }

        .loading-icon i {
            font-size: clamp(1.9rem, 8vw, 2.45rem);
            filter: drop-shadow(0 8px 14px rgba(13,148,136,.18));
        }

        .loading-text {
            margin: 0;
            font-size: clamp(1.25rem, 6vw, 1.65rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            color: var(--text-dark);
            text-align: center;
        }

        .loading-subtext {
            margin: 10px auto 0;
            max-width: 29ch;
            font-size: clamp(.9rem, 3.8vw, 1rem);
            line-height: 1.45;
            color: var(--text-gray);
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 7px;
            margin-top: 20px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--primary-red);
            opacity: .32;
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: .16s; }
        .loading-dots span:nth-child(3) { animation-delay: .32s; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes loadingPulse {
            50% { transform: scale(1.055) rotate(1deg); }
        }

        @keyframes dotPulse {
            50% { opacity: 1; transform: translateY(-3px); }
        }

        @media (max-width: 640px) {
            body {
                padding-left: calc(12px + var(--safe-area-inset-left));
                padding-right: calc(12px + var(--safe-area-inset-right));
            }

            .preview-frame {
                min-height: min(72dvh, 640px);
                border-radius: 24px;
            }

            .preview-toolbar {
                align-items: flex-start;
            }
        }
    </style>
<script src="./platform.js"></script>
</head>
<body>
    <main class="preview-layout">
        <section class="preview-toolbar">
            <div class="preview-toolbar-copy">
                <h1>Standalone preview за analysis loader</h1>
                <p>Това е отделен HTML за тест и редакция на екрана преди analysis.html.</p>
            </div>
            <div class="toolbar-actions">
                <button type="button" class="toolbar-btn" id="themeToggleBtn">Смени тема</button>
                <button type="button" class="toolbar-btn" id="openAnalysisBtn">Отвори analysis.html</button>
            </div>
        </section>

        <section class="preview-frame" aria-label="Преглед на loading екрана">
            <div class="loading-screen" id="loadingScreen" aria-live="polite" aria-busy="true">
                <div class="loading-card">
                    <div class="loading-orb" aria-hidden="true">
                        <div class="loading-spinner"></div>
                        <div class="loading-icon">♡</div>
                    </div>
                    <p class="loading-text">Подготвяме анализа</p>
                    <p class="loading-subtext">Синхронизираме здравните данни и визуализациите за вашия екран.</p>
                    <div class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            var color = theme === 'dark' ? '#0A1A1A' : '#F0FDFA';
            document.querySelectorAll('meta[name="theme-color"]').forEach(function(meta) {
                meta.setAttribute('content', color);
            });
        }

        document.getElementById('themeToggleBtn').addEventListener('click', function() {
            var currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        document.getElementById('openAnalysisBtn').addEventListener('click', function() {
            window.location.href = 'analysis.html';
        });
    </script>
</body>
</html>
