<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NutriPlan • Бърз отговор</title>
    <meta name="theme-color" content="#0b1120">
    <style>
        :root {
            --bg-1: #04111b;
            --bg-2: #0b1f2a;
            --card: rgba(9, 24, 36, 0.86);
            --card-border: rgba(94, 234, 212, 0.18);
            --text: #ecfeff;
            --muted: #94a3b8;
            --teal: #2dd4bf;
            --teal-strong: #14b8a6;
            --amber: #fbbf24;
            --rose: #fb7185;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
            --radius: 28px;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top, rgba(45,212,191,0.22), transparent 28%), linear-gradient(180deg, var(--bg-1), var(--bg-2)); color: var(--text); }
        body { overflow-x: hidden; overflow-y: auto; }
        .stars, .glow, .confetti { position: fixed; inset: 0; pointer-events: none; }
        .stars {
            background-image:
                radial-gradient(circle at 12% 18%, rgba(255,255,255,0.72) 0 1px, transparent 2px),
                radial-gradient(circle at 80% 14%, rgba(255,255,255,0.5) 0 1px, transparent 2px),
                radial-gradient(circle at 66% 34%, rgba(255,255,255,0.42) 0 1px, transparent 2px),
                radial-gradient(circle at 22% 76%, rgba(255,255,255,0.4) 0 1px, transparent 2px),
                radial-gradient(circle at 88% 72%, rgba(255,255,255,0.64) 0 1px, transparent 2px);
            animation: drift 16s linear infinite;
            opacity: 0.8;
        }
        .glow {
            background:
                radial-gradient(circle at 15% 20%, rgba(45,212,191,0.18), transparent 30%),
                radial-gradient(circle at 85% 18%, rgba(251,191,36,0.18), transparent 28%),
                radial-gradient(circle at 50% 85%, rgba(20,184,166,0.18), transparent 34%);
            filter: blur(12px);
        }
        .shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        .card {
            width: min(100%, 430px);
            position: relative;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            padding: 22px 18px 18px;
            opacity: 1;
            transform: none;
        }
        @media (prefers-reduced-motion: no-preference) {
            .card {
                transform: translateY(14px) scale(0.98);
                opacity: 0;
                animation: pop-in 0.22s ease-out forwards;
            }
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(45,212,191,0.12);
            border: 1px solid rgba(45,212,191,0.25);
            color: #ccfbf1;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .title {
            margin: 16px 0 8px;
            font-size: clamp(28px, 8vw, 36px);
            line-height: 1.06;
            font-weight: 800;
        }
        .subtitle {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.55;
        }
        .progress {
            display: flex;
            gap: 10px;
            margin: 0 0 18px;
        }
        .progress span {
            flex: 1;
            height: 6px;
            border-radius: 999px;
            background: rgba(148,163,184,0.18);
            overflow: hidden;
            position: relative;
        }
        .progress span::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--teal), #5eead4);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.26s ease;
        }
        .progress span.active::after { transform: scaleX(1); }
        .choices, .footer-actions, .chips {
            display: grid;
            gap: 12px;
        }
        .choice {
            width: 100%;
            border: 1px solid rgba(148,163,184,0.14);
            background: rgba(15,23,42,0.7);
            color: var(--text);
            border-radius: 22px;
            padding: 16px 14px;
            text-align: left;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
            box-shadow: 0 10px 24px rgba(0,0,0,0.18);
        }
        .choice:active {
            transform: scale(0.97);
            background: rgba(45,212,191,0.12);
            border-color: rgba(45,212,191,0.38);
        }
        .choice strong, .choice span { display: block; }
        .choice strong { font-size: 17px; margin-bottom: 4px; }
        .choice span { color: #cbd5e1; font-size: 13px; }
        .choice:hover, .choice:focus-visible {
            transform: translateY(-2px);
            border-color: rgba(45,212,191,0.44);
            box-shadow: 0 16px 34px rgba(13,148,136,0.18);
            outline: none;
        }
        .choice.primary {
            background: linear-gradient(180deg, rgba(20,184,166,0.24), rgba(13,148,136,0.18));
            border-color: rgba(45,212,191,0.34);
        }
        .choice.warn {
            background: linear-gradient(180deg, rgba(251,113,133,0.18), rgba(127,29,29,0.12));
        }
        .choice.selected {
            border-color: rgba(45,212,191,0.65);
            box-shadow: 0 0 0 1px rgba(45,212,191,0.3), 0 18px 36px rgba(20,184,166,0.22);
        }
        .inline-note {
            margin: 0 0 14px;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(45,212,191,0.12);
            border: 1px solid rgba(45,212,191,0.2);
            color: #d1fae5;
            font-size: 14px;
            line-height: 1.45;
        }
        .chips {
            margin: 0 0 16px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .chip {
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(148,163,184,0.14);
            font-size: 13px;
            color: #cbd5e1;
        }
        .chip strong { display: block; color: #f8fafc; font-size: 15px; margin-top: 3px; }
        .success {
            text-align: center;
            padding: 8px 4px 4px;
        }
        .success-icon {
            width: 84px;
            height: 84px;
            margin: 0 auto 14px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, rgba(94,234,212,0.32), rgba(20,184,166,0.16));
            box-shadow: 0 0 0 10px rgba(45,212,191,0.08), 0 18px 36px rgba(45,212,191,0.16);
            font-size: 38px;
        }
        .success h2 { margin: 0 0 10px; font-size: 28px; }
        .success p { margin: 0 0 18px; color: var(--muted); line-height: 1.55; }
        .footer-actions { margin-top: 18px; }
        .footer-actions button {
            width: 100%;
            border: 0;
            border-radius: 18px;
            padding: 15px 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .footer-actions .solid:active { opacity: 0.88; transform: scale(0.98); }
        .footer-actions .ghost:active { opacity: 0.78; }
        .footer-actions .solid {
            color: #042f2e;
            background: linear-gradient(180deg, #5eead4, #2dd4bf);
            box-shadow: 0 18px 36px rgba(45,212,191,0.24);
        }
        .footer-actions .ghost {
            color: var(--text);
            background: rgba(15,23,42,0.72);
            border: 1px solid rgba(148,163,184,0.18);
        }
        .confetti span {
            position: absolute;
            top: -8px;
            width: 10px;
            height: 18px;
            border-radius: 3px;
            animation: fall linear forwards;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
        @keyframes pop-in {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes drift {
            0% { transform: translateY(0); }
            50% { transform: translateY(12px); }
            100% { transform: translateY(0); }
        }
        @keyframes fall {
            to { transform: translate3d(var(--tx), 110vh, 0) rotate(var(--rot)); opacity: 0.15; }
        }
    </style>
<script src="./platform.js"></script>
<script src="./platform-compat.js"></script>
</head>
<body>
    <div class="stars"></div>
    <div class="glow"></div>
    <div class="confetti" id="confetti" aria-hidden="true"></div>
    <main class="shell">
        <section class="card" id="card" aria-live="polite"></section>
    </main>

    <script src="./local-scheduler.js"></script>
    <script>
    (function() {
        document.documentElement.style.visibility = 'visible';

        var params = new URLSearchParams(window.location.search);
        var rawType = params.get('type') || 'morning_check';
        var auto = params.get('auto') || '';
        var recordKey = normalizeDateKey(params.get('date'));
        var notifType = normalizeNotifType(rawType);
        var isCatchUpQueue = params.get('queue') === '1' || params.get('source') === 'app';

        var card = document.getElementById('card');
        var confettiLayer = document.getElementById('confetti');
        var closing = false;

        var FALLBACK_COPY = {
            morning_check: {
                title: 'AI Асистент',
                body: 'Спахте ли добре тази нощ?',
                actions: [
                    { id: 'sleep_yes', title: 'Да' },
                    { id: 'sleep_no', title: 'Не' }
                ]
            },
            evening_activity: {
                title: 'AI Асистент',
                body: 'Ниво на активност?',
                actions: [
                    { id: 'activity_1', title: 'Ниска' },
                    { id: 'activity_2', title: 'Умерена' },
                    { id: 'activity_3', title: 'Висока' }
                ]
            },
            evening_balance: {
                title: 'AI Асистент',
                body: 'Емоционален баланс?',
                actions: [
                    { id: 'balance_1', title: 'Напрегнат' },
                    { id: 'balance_2', title: 'Спокоен' },
                    { id: 'balance_3', title: 'Позитивен' }
                ]
            },
            evening_water: {
                title: 'AI Асистент',
                body: 'Изпихте ли поне 2 л вода?',
                actions: [
                    { id: 'water_no', title: 'Не' },
                    { id: 'water_yes', title: 'Да' }
                ]
            }
        };

        function normalizeNotifType(t) {
            if (t === 'evening_check') return 'evening_water';
            if (t === 'morning_check' || t === 'evening_activity' || t === 'evening_balance' || t === 'evening_water') return t;
            return 'morning_check';
        }

        function getQuestionDisplaySafe(type) {
            var gn = window.GameNotifier;
            if (gn && typeof gn.getQuestionDisplay === 'function') {
                var display = gn.getQuestionDisplay(type);
                if (display && display.body && display.actions && display.actions.length) return display;
            }
            return FALLBACK_COPY[type] || FALLBACK_COPY.morning_check;
        }

        if (auto) {
            whenGameNotifierReady(function() {
                applySilentAction(notifType, auto, recordKey);
            });
            return;
        }

        function pad(n) { return n < 10 ? '0' + n : '' + n; }
        function todayKey() {
            var d = new Date();
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
        }
        function normalizeDateKey(value) {
            return /^\d{4}-\d{2}-\d{2}$/.test(value || '') ? value : todayKey();
        }
        function vibrate(pattern) {
            try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (_) {}
        }
        function escapeHtml(text) {
            return String(text || '').replace(/[&<>"']/g, function(ch) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
            });
        }
        function dateLabel(key) {
            if (key === todayKey()) return 'Днес';
            try {
                var parts = key.split('-').map(Number);
                var d = new Date(parts[0], parts[1] - 1, parts[2]);
                return d.toLocaleDateString('bg-BG', { day: 'numeric', month: 'long' });
            } catch (_) {
                return key;
            }
        }
        function makeConfetti(count) {
            confettiLayer.innerHTML = '';
            var colors = ['#2dd4bf', '#5eead4', '#fbbf24', '#fb7185', '#38bdf8', '#a78bfa'];
            for (var i = 0; i < count; i++) {
                var part = document.createElement('span');
                var size = 6 + Math.random() * 8;
                part.style.left = Math.random() * 100 + '%';
                part.style.width = size + 'px';
                part.style.height = size * (0.8 + Math.random()) + 'px';
                part.style.background = colors[Math.floor(Math.random() * colors.length)];
                part.style.opacity = 0.85;
                part.style.setProperty('--tx', ((Math.random() - 0.5) * 160) + 'px');
                part.style.setProperty('--rot', Math.round(Math.random() * 360) + 'deg');
                part.style.animationDuration = (1.2 + Math.random() * 1.8) + 's';
                part.style.animationDelay = (Math.random() * 0.2) + 's';
                confettiLayer.appendChild(part);
            }
            setTimeout(function() { confettiLayer.innerHTML = ''; }, 2600);
        }
        function render(shellHtml) {
            card.innerHTML = shellHtml;
        }
        function viewPlan() {
            if (window.top !== window) {
                try {
                    window.top.location.href = './index.html?app=1&tab=plan';
                    return;
                } catch (_) {}
            }
            window.location.href = './index.html?app=1&tab=plan';
        }
        function closeFlow() {
            if (closing) return;
            closing = true;
            document.documentElement.style.visibility = 'hidden';
            document.documentElement.style.background = '#0A1A1A';

            if (window.NutriPlanPlatform && typeof window.NutriPlanPlatform.exitNativeApp === 'function') {
                if (window.NutriPlanPlatform.exitNativeApp()) return;
            }
            var gn = window.GameNotifier;
            if (gn && typeof gn.exitAppSilently === 'function' && gn.exitAppSilently()) {
                return;
            }

            try { window.close(); } catch (_) {}
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
        }

        function exitAfterAnswer() {
            vibrate([20, 30, 20]);
            if (isCatchUpQueue) {
                proceedCatchUpAfterAnswer(null);
                return;
            }
            if (window.NutriPlanPlatform && window.NutriPlanPlatform.isAPK && window.NutriPlanPlatform.isAPK()) {
                closeFlow();
                return;
            }
            finishEncouragement(null, 500);
        }

        function queueProgressHint() {
            if (!isCatchUpQueue) return '';
            var gn = window.GameNotifier;
            if (!gn || !gn.QUESTION_TYPE_ORDER) return '';
            var due = gn.QUESTION_TYPE_ORDER.filter(function(t) {
                return gn._hasNotificationSlotPassed && gn._hasNotificationSlotPassed(recordKey, t);
            });
            var pending = gn.getUnansweredTypesForDate
                ? gn.getUnansweredTypesForDate(recordKey, { requireSlotPassed: true })
                : [];
            if (due.length < 2) return '';
            var current = due.length - pending.length + 1;
            return 'Въпрос ' + current + ' от ' + due.length;
        }

        function proceedCatchUpAfterAnswer(actionId) {
            var gn = window.GameNotifier;
            var remaining = gn && typeof gn.getUnansweredTypesForDate === 'function'
                ? gn.getUnansweredTypesForDate(recordKey, { requireSlotPassed: true })
                : [];
            if (remaining.length) {
                var nextUrl = gn.buildCatchUpQuickAnswerUrl
                    ? gn.buildCatchUpQuickAnswerUrl(recordKey, remaining)
                    : null;
                showQueueEncouragement(actionId, function() {
                    if (nextUrl) {
                        window.location.replace(String(nextUrl).replace(/^\//, ''));
                    } else {
                        renderQuestionScreen();
                    }
                });
                return;
            }
            showQueueEncouragement(actionId, function() {
                viewPlan();
            });
        }

        function showQueueEncouragement(actionId, onDone) {
            var enc = (window.GameNotifier && typeof window.GameNotifier.encouragementForAction === 'function')
                ? window.GameNotifier.encouragementForAction(actionId)
                : { title: 'Записано ✨', message: 'Отговорът е в анализа.', confetti: 12 };
            vibrate([20, 30, 20]);
            if (enc.confetti) makeConfetti(enc.confetti);
            render(
                '<div class="badge">✨ Записано</div>' +
                '<div class="success">' +
                    '<div class="success-icon">✓</div>' +
                    '<h2>' + escapeHtml(enc.title) + '</h2>' +
                    '<p>' + escapeHtml(enc.message) + '</p>' +
                '</div>'
            );
            setTimeout(onDone, 420);
        }
        function whenGameNotifierReady(cb, attempt) {
            attempt = attempt || 0;
            var gn = window.GameNotifier;
            if (gn && typeof gn.getQuestionDisplay === 'function') {
                if (!gn._initialized && typeof gn.init === 'function') {
                    gn.init().then(function() { cb(); }).catch(function() { cb(); });
                    return;
                }
                cb();
                return;
            }
            if (attempt < 80) {
                setTimeout(function() { whenGameNotifierReady(cb, attempt + 1); }, 50);
                return;
            }
            render(
                '<div class="badge">⚠️ Грешка</div>' +
                '<h1 class="title">Неуспешно зареждане</h1>' +
                '<p class="subtitle">Моля, опитайте отново или отворете приложението.</p>' +
                '<div class="footer-actions">' +
                    '<button class="solid" id="retryBtn">Опитай отново</button>' +
                    '<button class="ghost" id="openPlanBtn">Отвори приложението</button>' +
                '</div>'
            );
            document.getElementById('retryBtn').addEventListener('click', function() {
                render('<p class="subtitle">Зареждане…</p>');
                whenGameNotifierReady(cb, 0);
            });
            document.getElementById('openPlanBtn').addEventListener('click', viewPlan);
        }

        function applySilentAction(type, actionId, key) {
            var gn = window.GameNotifier;
            render(
                '<div class="badge">✨ Записване</div>' +
                '<div class="success">' +
                    '<div class="success-icon">…</div>' +
                    '<h2>Записваме отговора</h2>' +
                    '<p>Моля, изчакайте момент.</p>' +
                '</div>'
            );
            var saved = false;
            if (gn && typeof gn.handleNotificationAction === 'function') {
                var outcome = gn.handleNotificationAction({
                    notificationType: type,
                    action: actionId,
                    recordKey: key
                });
                saved = !!(outcome && outcome.saved);
                if (typeof gn.showSilentAck === 'function') gn.showSilentAck(actionId);
                if (saved && typeof gn.notifyAnswerSaved === 'function') {
                    gn.notifyAnswerSaved(key);
                }
            }
            if (!saved) {
                render(
                    '<div class="badge">⚠️</div>' +
                    '<h1 class="title">Неуспешен запис</h1>' +
                    '<p class="subtitle">Отворете приложението и отговорете отново.</p>' +
                    '<div class="footer-actions"><button class="solid" id="openPlanBtn">Отвори приложението</button></div>'
                );
                document.getElementById('openPlanBtn').addEventListener('click', viewPlan);
                setTimeout(closeFlow, 1200);
                return;
            }
            exitAfterAnswer();
        }
        function finishEncouragement(actionId, closeMs) {
            closeMs = closeMs || 500;
            var enc = (window.GameNotifier && typeof window.GameNotifier.encouragementForAction === 'function')
                ? window.GameNotifier.encouragementForAction(actionId)
                : { title: 'Готово ✨', message: 'Записано.', confetti: 16 };
            vibrate([20, 30, 20]);
            if (enc.confetti) makeConfetti(enc.confetti);
            render(
                '<div class="badge">✨ Записано</div>' +
                '<div class="success">' +
                    '<div class="success-icon">✓</div>' +
                    '<h2>' + escapeHtml(enc.title) + '</h2>' +
                    '<p>' + escapeHtml(enc.message) + '</p>' +
                '</div>'
            );
            setTimeout(closeFlow, closeMs);
        }
        function onAnswerChosen(actionId) {
            var gn = window.GameNotifier;
            if (!gn || typeof gn.handleNotificationAction !== 'function') return;
            var outcome = gn.handleNotificationAction({
                notificationType: notifType,
                action: actionId,
                recordKey: recordKey
            });
            if (!outcome.saved && outcome.ack !== 'skip') {
                if (isCatchUpQueue) {
                    proceedCatchUpAfterAnswer(null);
                    return;
                }
                renderAlreadyAnswered('Вече е записано', 'За ' + dateLabel(recordKey) + ' вече има отговор.');
                setTimeout(closeFlow, 900);
                return;
            }
            if (typeof gn.notifyAnswerSaved === 'function') gn.notifyAnswerSaved(recordKey);
            exitAfterAnswer();
        }
        function renderAlreadyAnswered(title, message) {
            render(
                '<div class="badge">🛡️ Вече е записано</div>' +
                '<h1 class="title">' + escapeHtml(title) + '</h1>' +
                '<p class="subtitle">' + escapeHtml(message) + '</p>' +
                '<div class="footer-actions">' +
                    '<button class="solid" id="openPlanBtn">Отвори плана</button>' +
                    '<button class="ghost" id="closeBtn">Назад</button>' +
                '</div>'
            );
            document.getElementById('openPlanBtn').addEventListener('click', viewPlan);
            document.getElementById('closeBtn').addEventListener('click', closeFlow);
        }
        function choiceTone(actionId) {
            if (actionId === 'skip') return '';
            if (actionId === 'sleep_no' || actionId === 'water_no') return ' warn';
            return ' primary';
        }
        function renderQuestionScreen() {
            whenGameNotifierReady(function() {
                renderQuestionScreenReady();
            });
        }

        function renderQuestionScreenReady() {
            var gn = window.GameNotifier;
            if (!gn || typeof gn.getQuestionDisplay !== 'function') {
                render('<p class="subtitle">Липсва конфигурация за въпроса.</p>');
                return;
            }
            if (gn._isQuestionAnswered && gn._isQuestionAnswered(recordKey, notifType)) {
                if (isCatchUpQueue) {
                    proceedCatchUpAfterAnswer(null);
                    return;
                }
                renderAlreadyAnswered('Вече е записано', 'За ' + dateLabel(recordKey) + ' вече има запазен отговор.');
                setTimeout(closeFlow, 1200);
                return;
            }
            var display = getQuestionDisplaySafe(notifType);
            if (!display || !display.actions || !display.actions.length) {
                render('<p class="subtitle">Липсва конфигурация за въпроса.</p>');
                return;
            }
            var questionText = String(display.body || '').trim();
            if (!questionText) {
                render('<p class="subtitle">Липсва текст на въпроса.</p>');
                return;
            }
            var badge = notifType.indexOf('evening_') === 0 ? '🌙 Вечер' : '🌅 Сутрин';
            var progress = queueProgressHint();
            var actions = display.actions;
            if (isCatchUpQueue) {
                actions = actions.filter(function(a) { return a.id !== 'skip'; });
            }
            if (!actions.length) {
                render('<p class="subtitle">Липсва конфигурация за въпроса.</p>');
                return;
            }
            var choicesHtml = actions.map(function(action) {
                return '<button class="choice' + choiceTone(action.id) + '" type="button" data-action-id="' + escapeHtml(action.id) + '">' +
                    '<strong>' + escapeHtml(action.title) + '</strong>' +
                    '<span>Докоснете за запис</span>' +
                '</button>';
            }).join('');
            render(
                '<div class="badge">' + badge + ' • ' + escapeHtml(dateLabel(recordKey)) + '</div>' +
                (progress ? '<p class="inline-note">' + escapeHtml(progress) + '</p>' : '') +
                '<h1 class="title">' + escapeHtml(display.body) + '</h1>' +
                '<p class="subtitle">' + escapeHtml(display.title) + '</p>' +
                '<div class="choices" id="choices">' + choicesHtml + '</div>' +
                (isCatchUpQueue ? '' : (
                    '<div class="footer-actions">' +
                        '<button type="button" class="ghost" id="openPlanBtn">Отвори приложението</button>' +
                    '</div>'
                ))
            );
            Array.prototype.forEach.call(document.querySelectorAll('#choices .choice'), function(btn) {
                btn.addEventListener('click', function() {
                    vibrate(14);
                    onAnswerChosen(btn.getAttribute('data-action-id'));
                });
            });
            var openPlanBtn = document.getElementById('openPlanBtn');
            if (openPlanBtn) openPlanBtn.addEventListener('click', viewPlan);
        }

        render('<p class="subtitle">Зареждане…</p>');
        renderQuestionScreen();
    })();
    </script>
</body>
</html>
