<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="NutriPlan — Твоята персонална здравна платформа. AI анализ, 7-дневен хранителен план, психология, добавки и активности.">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#F0FDFA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0A1A1A" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NutriPlan">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512x512.png">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-192x192.png">
    <title>NutriPlan</title>
    <!-- Design System -->
    <link rel="stylesheet" href="./design-system.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Inline theme init: apply saved theme before first paint -->
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);var c=t==='dark'?'#0A1A1A':'#F0FDFA';document.querySelectorAll('meta[name="theme-color"]').forEach(function(m){m.setAttribute('content',c);});})();</script>
    <style>
        :root {
            --nav-height: 60px;
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --shell-nav-height: calc(var(--nav-height) + var(--safe-area-inset-bottom));
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--ds-primary-50, #F0FDFA);
        }

        [data-theme="dark"] body {
            background: #0A1A1A;
        }

        /* ── Tab frame containers ── */
        .tab-frame {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: var(--shell-nav-height);
            overflow: hidden;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translate3d(0, 8px, 0) scale(0.995);
            transition:
                opacity 120ms ease-out,
                transform 160ms cubic-bezier(0.22, 1, 0.36, 1),
                visibility 0s linear 160ms;
            contain: layout style paint;
            will-change: opacity, transform;
            z-index: 0;
        }

        .tab-frame.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
            transform: translate3d(0, 0, 0) scale(1);
            transition-delay: 0s;
            animation: _shell_tab_enter 180ms cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 1;
        }

        .tab-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: transparent;
            transform: translateZ(0);
        }

        @media (prefers-reduced-motion: reduce) {
            .tab-frame {
                transition: none;
                transform: none;
            }
            .tab-frame.active { animation: none; }
        }

        @keyframes _shell_tab_enter {
            from { opacity: 0.01; transform: translate3d(0, 8px, 0) scale(0.995); }
            to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        }

        /* ── Shell bottom navigation ── */
        .shell-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: var(--shell-nav-height);
            padding: 0 8px var(--safe-area-inset-bottom);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-top: 1px solid rgba(13, 148, 136, 0.1);
            box-shadow: 0 -2px 16px rgba(0, 0, 0, 0.06), 0 -1px 0 rgba(13, 148, 136, 0.06);
            transform: translateZ(0);
        }

        [data-theme="dark"] .shell-nav {
            background: rgba(8, 22, 22, 0.96);
            border-top: none;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.5), 0 -1px 0 rgba(45, 212, 191, 0.08);
        }

        .shell-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 7px 18px;
            min-width: 64px;
            border-radius: 16px;
            border: none;
            background: transparent;
            color: #6b7280;
            font-family: inherit;
            font-size: 10px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.15s ease, background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .shell-nav-item i {
            font-size: 20px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .shell-nav-item.active {
            color: #0D9488;
            background:
                radial-gradient(circle at 50% 10%, rgba(255,255,255,0.92), rgba(255,255,255,0) 46%),
                linear-gradient(135deg, rgba(13, 148, 136, 0.16), rgba(20, 184, 166, 0.08));
            box-shadow: 0 10px 28px rgba(13, 148, 136, 0.18), inset 0 1px 0 rgba(255,255,255,0.55);
        }

        [data-theme="dark"] .shell-nav-item.active {
            background:
                radial-gradient(circle at 50% 10%, rgba(45,212,191,0.2), rgba(45,212,191,0) 48%),
                linear-gradient(135deg, rgba(45, 212, 191, 0.2), rgba(13, 148, 136, 0.12));
            color: #2DD4BF;
            box-shadow: 0 10px 30px rgba(45, 212, 191, 0.12), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .shell-nav-item.active i { transform: scale(1.1); }
        .shell-nav-item:active { transform: scale(0.92); }

        .shell-nav-item:hover:not(.active) {
            background: rgba(13, 148, 136, 0.05);
        }

        /* Shell-level FABs: the embedded pages hide their own FABs, so the shell
           keeps the same actions visible while iframes stay alive. */
        .shell-fab {
            position: fixed;
            bottom: calc(var(--shell-nav-height) + 20px);
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 10000;
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #0D9488 0%, #0F766E 100%);
            box-shadow:
                0 8px 28px rgba(13, 148, 136, 0.45),
                0 4px 12px rgba(13, 148, 136, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }

        .shell-fab::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 50%);
            pointer-events: none;
        }

        .shell-fab-chat {
            right: calc(16px + env(safe-area-inset-right, 0px));
            overflow: hidden;
            animation: _shell_fab_pulse 3s ease-in-out infinite;
        }

        .shell-fab-chat.fab-raised {
            bottom: calc(100vh - env(safe-area-inset-top, 0px) - 80px - 56px);
        }

        .shell-fab-chat.game-prompt {
            animation: _shell_fab_bounce 1.1s ease-in-out 2, _shell_fab_pulse 3s ease-in-out 2.2s infinite;
        }

        .shell-fab-food {
            left: calc(16px + env(safe-area-inset-left, 0px));
            font-size: 1.3rem;
        }

        .shell-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 36px rgba(13, 148, 136, 0.55);
        }

        .shell-fab-chat:hover {
            transform: scale(1.12) rotate(5deg);
            animation: none;
        }

        .shell-fab:active { transform: scale(0.95); }

        .shell-chat-icon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
        }

        @keyframes _shell_fab_pulse {
            0%, 100% {
                box-shadow:
                    0 8px 28px rgba(13, 148, 136, 0.45),
                    0 4px 12px rgba(13, 148, 136, 0.25),
                    0 0 0 0 rgba(13, 148, 136, 0.35),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
                transform: scale(1);
            }
            50% {
                box-shadow:
                    0 12px 36px rgba(13, 148, 136, 0.55),
                    0 6px 16px rgba(13, 148, 136, 0.35),
                    0 0 0 14px rgba(13, 148, 136, 0),
                    inset 0 1px 0 rgba(255, 255, 255, 0.25);
                transform: scale(1.05);
            }
        }

        @keyframes _shell_fab_bounce {
            0%, 100% { transform: translateY(0); }
            18% { transform: translateY(-10px); }
            36% { transform: translateY(-4px); }
            54% { transform: translateY(-8px); }
            72% { transform: translateY(-2px); }
        }

        /* Loading placeholder while first iframe loads */
        .tab-loader {
            position: fixed;
            inset: 0 0 var(--shell-nav-height) 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--ds-primary-50, #F0FDFA);
            z-index: 1;
            transition: opacity 0.2s;
        }

        [data-theme="dark"] .tab-loader {
            background: #0A1A1A;
        }

        .tab-loader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #0D9488;
            border-top-color: transparent;
            border-radius: 50%;
            animation: _shell_spin 0.8s linear infinite;
        }

        @keyframes _shell_spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Loading indicator (hidden once first iframe loads) -->
    <div class="tab-loader" id="tabLoader">
        <div class="tab-loader-spinner"></div>
    </div>

    <!-- Tab frame: Plan (loaded eagerly) -->
    <div class="tab-frame active" id="frame-plan">
        <iframe id="iframe-plan" src="./plan.html" title="Моят План" loading="eager" fetchpriority="high" allowfullscreen></iframe>
    </div>

    <!-- Tab frame: Guidelines (warm-loaded after first paint and kept alive) -->
    <div class="tab-frame" id="frame-guidelines">
        <iframe id="iframe-guidelines" title="Насоки" loading="lazy" fetchpriority="low" allowfullscreen></iframe>
    </div>

    <!-- Tab frame: Profile (warm-loaded after first paint and kept alive) -->
    <div class="tab-frame" id="frame-profile">
        <iframe id="iframe-profile" title="Профил" loading="lazy" fetchpriority="low" allowfullscreen></iframe>
    </div>

    <!-- Tab frame: Home / Index (warm-loaded after first paint and kept alive) -->
    <div class="tab-frame" id="frame-home">
        <iframe id="iframe-home" title="Начало" loading="lazy" fetchpriority="low" allowfullscreen></iframe>
    </div>

    <button class="shell-fab shell-fab-chat" onclick="shellPlanShortcut('chat')" aria-label="Отвори чат асистент">
        <img src="./docs/Chat2.png" alt="" class="shell-chat-icon-img" aria-hidden="true">
    </button>

    <button class="shell-fab shell-fab-food" onclick="shellPlanShortcut('food')" aria-label="Анализ на храна чрез снимка">
        <i class="fas fa-camera" aria-hidden="true"></i>
    </button>

    <!-- Shell bottom navigation (always on top, managed by shell) -->
    <nav class="shell-nav" id="shellNav" role="navigation" aria-label="Основна навигация">
        <button class="shell-nav-item" data-tab="home" onclick="shellSwitchTab('home')" aria-label="Начало">
            <i class="fas fa-home" aria-hidden="true"></i>
            <span>Начало</span>
        </button>
        <button class="shell-nav-item active" data-tab="plan" onclick="shellSwitchTab('plan')" aria-label="Моят План">
            <i class="fas fa-utensils" aria-hidden="true"></i>
            <span>Моят План</span>
        </button>
        <button class="shell-nav-item" data-tab="guidelines" onclick="shellSwitchTab('guidelines')" aria-label="Насоки">
            <i class="fas fa-compass" aria-hidden="true"></i>
            <span>Насоки</span>
        </button>
        <button class="shell-nav-item" data-tab="profile" onclick="shellSwitchTab('profile')" aria-label="Профил">
            <i class="fas fa-user" aria-hidden="true"></i>
            <span>Профил</span>
        </button>
    </nav>

    <script>
    (function() {
        'use strict';

        // Map tab name → iframe element src (fallback if a WebView drops iframe src)
        var TAB_SRCS = {
            plan:       './plan.html',
            guidelines: './guidelines.html',
            profile:    './profile.html',
            home:       './index.html?stay=1'
        };

        var SEARCH = new URLSearchParams(window.location.search);
        var REQUESTED_ACTION = SEARCH.get('action');
        var REQUESTED_TAB = SEARCH.get('tab');
        if (REQUESTED_ACTION === 'chat' || REQUESTED_ACTION === 'food') {
            REQUESTED_TAB = 'plan';
        }

        function sanitizeTab(tab) {
            return TAB_SRCS[tab] ? tab : 'plan';
        }

        var _currentTab = sanitizeTab(REQUESTED_TAB || 'plan');
        var _loadedTabs = { plan: true, guidelines: false, profile: false, home: false };
        var _pendingPlanMessage = null;
        var _warmupScheduled = false;

        // Hide loader once the active iframe fires load
        var planIframe = document.getElementById('iframe-plan');
        var loader = document.getElementById('tabLoader');

        function hideLoader() {
            if (!loader) return;
            loader.style.opacity = '0';
            setTimeout(function() { if (loader) loader.remove(); }, 250);
            loader = null;
        }

        function setIframeSrc(tab) {
            var frame = document.getElementById('iframe-' + tab);
            if (!frame || _loadedTabs[tab]) return frame;
            frame.src = TAB_SRCS[tab];
            _loadedTabs[tab] = true;
            return frame;
        }

        function tryHandlePlanShortcut(message, planIf) {
            if (!message || message.type !== 'PLAN_SHORTCUT' || !planIf || !planIf.contentWindow) return false;
            var action = message.action;
            try {
                if (action === 'chat' && typeof planIf.contentWindow.openChat === 'function') {
                    planIf.contentWindow.openChat();
                    return true;
                }
                if (action === 'food' && typeof planIf.contentWindow.openFoodAnalysis === 'function') {
                    planIf.contentWindow.openFoodAnalysis();
                    return true;
                }
            } catch (e) {}
            return false;
        }

        function dispatchPlanMessage(message) {
            var planIf = setIframeSrc('plan') || planIframe;
            if (!planIf) return;
            if (planIf.dataset.ready === 'true' && planIf.contentWindow) {
                if (tryHandlePlanShortcut(message, planIf)) return;
                try { planIf.contentWindow.postMessage(message, '*'); } catch(e) {}
                return;
            }
            _pendingPlanMessage = message;
        }

        function flushPendingPlanMessage() {
            if (!_pendingPlanMessage || !planIframe || planIframe.dataset.ready !== 'true' || !planIframe.contentWindow) return;
            if (tryHandlePlanShortcut(_pendingPlanMessage, planIframe)) {
                _pendingPlanMessage = null;
                return;
            }
            try { planIframe.contentWindow.postMessage(_pendingPlanMessage, '*'); } catch(e) {}
            _pendingPlanMessage = null;
        }

        function persistCurrentTab() {
            try { localStorage.setItem('np_shell_active_tab', _currentTab); } catch (_) {}
        }

        function syncActiveUi() {
            document.querySelectorAll('.tab-frame').forEach(function(f) {
                f.classList.toggle('active', f.id === 'frame-' + _currentTab);
            });
            document.querySelectorAll('.shell-nav-item').forEach(function(btn) {
                btn.classList.toggle('active', btn.getAttribute('data-tab') === _currentTab);
            });
            var _fabTabs = ['plan', 'guidelines'];
            document.querySelectorAll('.shell-fab').forEach(function(fab) {
                fab.style.display = _fabTabs.indexOf(_currentTab) >= 0 ? 'flex' : 'none';
            });
        }

        function scheduleWarmup() {
            if (_warmupScheduled) return;
            _warmupScheduled = true;
            var remaining = Object.keys(TAB_SRCS).filter(function(tab) { return tab !== _currentTab; });
            function warmNext() {
                var next = remaining.shift();
                if (!next) return;
                setIframeSrc(next);
                setTimeout(warmNext, 180);
            }
            var starter = window.requestIdleCallback
                ? function(cb) { window.requestIdleCallback(cb, { timeout: 600 }); }
                : function(cb) { setTimeout(cb, 220); };
            starter(warmNext);
        }

        planIframe.addEventListener('load', function() {
            planIframe.dataset.ready = 'true';
            if (_currentTab === 'plan') hideLoader();
            flushPendingPlanMessage();
            scheduleWarmup();
        });

        ['guidelines', 'profile', 'home'].forEach(function(tab) {
            var frame = document.getElementById('iframe-' + tab);
            if (!frame) return;
            frame.addEventListener('load', function() {
                frame.dataset.ready = 'true';
                if (_currentTab === tab) hideLoader();
            });
        });

        if (_currentTab !== 'plan') {
            setIframeSrc(_currentTab);
        }
        syncActiveUi();
        persistCurrentTab();

        // Public switch function (also called by shell nav buttons)
        window.shellSwitchTab = function(tab) {
            tab = sanitizeTab(tab);
            if (tab === _currentTab) return;

            var targetFrame = document.getElementById('frame-' + tab);
            if (!targetFrame) return;

            // Fallback warm-up before showing the frame.
            var iframe = setIframeSrc(tab) || document.getElementById('iframe-' + tab);

            _currentTab = tab;
            syncActiveUi();
            persistCurrentTab();
            scheduleWarmup();

            // Notify the newly-active iframe that it was shown (for refresh-on-focus)
            if (iframe && iframe.contentWindow) {
                try { iframe.contentWindow.postMessage({ type: 'TAB_ACTIVATED' }, '*'); } catch(e) {}
            }
        };

        window.shellPlanShortcut = function(action) {
            window.shellSwitchTab('plan');
            dispatchPlanMessage({ type: 'PLAN_SHORTCUT', action: action });
        };

        // Hidden file input used as a proxy for iframes (Capacitor WebView doesn't
        // fire onShowFileChooser for <input type="file"> inside sub-frames).
        var _shellFileInput = (function() {
            var el = document.createElement('input');
            el.type = 'file';
            el.accept = 'image/*';
            el.style.cssText = 'position:fixed;top:-200px;left:-200px;width:1px;height:1px;opacity:0;pointer-events:none;';
            document.body.appendChild(el);
            return el;
        })();

        // Listen for tab-switch requests from inner pages (via postMessage)
        window.addEventListener('message', function(e) {
            if (!e.data) return;
            if (e.data.type === 'SWITCH_TAB') {
                var tab = e.data.tab;
                if (tab && TAB_SRCS[tab]) {
                    window.shellSwitchTab(tab);
                }
                return;
            }
            if (e.data.type === 'GAME_PROMPT_STATE') {
                var chatFab = document.querySelector('.shell-fab-chat');
                if (!chatFab) return;
                chatFab.classList.toggle('fab-raised', !!e.data.active);
                if (e.data.active) {
                    chatFab.classList.add('game-prompt');
                    setTimeout(function(){ chatFab.classList.remove('game-prompt'); }, 2600);
                } else {
                    chatFab.classList.remove('game-prompt');
                }
                return;
            }
            // File-picker bridge: profile iframe asks the shell to open a file chooser
            // because <input type="file"> inside an iframe doesn't work in Capacitor WebView.
            if (e.data.type === 'OPEN_FILE_PICKER') {
                var sourceFrame = e.source;
                if (!sourceFrame) return;
                _shellFileInput.accept = e.data.accept || 'image/*';
                _shellFileInput.value = '';
                var onPick = function() {
                    _shellFileInput.removeEventListener('change', onPick);
                    var file = _shellFileInput.files && _shellFileInput.files[0];
                    if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function(ev) {
                        try { sourceFrame.postMessage({ type: 'FILE_PICKED', dataUrl: ev.target.result }, '*'); } catch(_) {}
                    };
                    reader.readAsDataURL(file);
                };
                _shellFileInput.addEventListener('change', onPick);
                _shellFileInput.click();
                return;
            }
        });

        // Swipe gesture on shell level (for when user swipes on the nav bar area)
        var _swipeStartX = 0;
        var _swipeStartY = 0;
        var TAB_ORDER = ['home', 'plan', 'guidelines', 'profile'];
        document.getElementById('shellNav').addEventListener('touchstart', function(e) {
            _swipeStartX = e.changedTouches[0].clientX;
            _swipeStartY = e.changedTouches[0].clientY;
        }, { passive: true });
        document.getElementById('shellNav').addEventListener('touchend', function(e) {
            var dx = e.changedTouches[0].clientX - _swipeStartX;
            var dy = e.changedTouches[0].clientY - _swipeStartY;
            if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;
            var idx = TAB_ORDER.indexOf(_currentTab);
            if (dx < 0 && idx < TAB_ORDER.length - 1) window.shellSwitchTab(TAB_ORDER[idx + 1]);
            else if (dx > 0 && idx > 0) window.shellSwitchTab(TAB_ORDER[idx - 1]);
        }, { passive: true });

        // Handle notification clicks that target plan.html when shell is open
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', function(e) {
                var msg = e.data;
                if (!msg) return;
                // Forward NOTIFICATION_ACTION to plan iframe
                if (msg.type === 'NOTIFICATION_ACTION') {
                    window.shellSwitchTab('plan');
                    dispatchPlanMessage(msg);
                }
            });
        }

        if (REQUESTED_ACTION === 'chat' || REQUESTED_ACTION === 'food') {
            dispatchPlanMessage({ type: 'PLAN_SHORTCUT', action: REQUESTED_ACTION });
            if (window.history && window.history.replaceState) {
                var cleaned = new URL(window.location.href);
                cleaned.searchParams.delete('action');
                if (!SEARCH.get('tab')) cleaned.searchParams.delete('tab');
                window.history.replaceState({}, '', cleaned.pathname + cleaned.search + cleaned.hash);
            }
        } else {
            scheduleWarmup();
        }
    })();
    </script>
</body>
</html>
