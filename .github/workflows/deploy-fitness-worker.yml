name: Deploy FitPlan AI Worker

on:
  push:
    branches:
      - main
    paths:
      - 'fitness/**'
      - '.github/workflows/deploy-fitness-worker.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'fitness/**'
      - '.github/workflows/deploy-fitness-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync worker secrets (production)
        if: github.event_name != 'pull_request'
        working-directory: fitness
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "::warning::GEMINI_API_KEY липсва в GitHub repository secrets."
            echo "::warning::Standalone worker (aidiet-fitness) няма да има AI ключове от CI."
            echo "::warning::Добави GEMINI_API_KEY в Settings → Secrets → Actions, или ръчно: cd fitness && npx wrangler secret put GEMINI_API_KEY --env production"
            echo "::warning::Приложението ползва https://aidiet.radilov-k.workers.dev — там ключовете работят."
          else
            printf '%s' "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY --env production
            echo "GEMINI_API_KEY синхронизиран към aidiet-fitness (production)."
          fi
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            printf '%s' "$OPENAI_API_KEY" | npx wrangler secret put OPENAI_API_KEY --env production
            echo "OPENAI_API_KEY синхронизиран към aidiet-fitness (production)."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Sync worker secrets (staging)
        if: github.event_name == 'pull_request'
        working-directory: fitness
        run: |
          set -euo pipefail
          if [ -n "${GEMINI_API_KEY:-}" ]; then
            printf '%s' "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY --env staging
          fi
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            printf '%s' "$OPENAI_API_KEY" | npx wrangler secret put OPENAI_API_KEY --env staging
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Deploy FitPlan worker
        working-directory: fitness
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Deploying FitPlan AI to staging..."
            npx wrangler deploy --env staging
          else
            echo "Deploying FitPlan AI to production..."
            npx wrangler deploy --env production
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify health endpoint
        if: github.event_name != 'pull_request'
        run: |
          for i in 1 2 3 4 5; do
            status=$(curl -sS -o /tmp/fitness-health.json -w "%{http_code}" https://aidiet-fitness.radilov-k.workers.dev/api/health || true)
            if [ "$status" = "200" ]; then
              cat /tmp/fitness-health.json
              if ! jq -e '.providers.gemini == true or .providers.openai == true' /tmp/fitness-health.json >/dev/null 2>&1; then
                echo "::warning::aidiet-fitness: няма AI ключове в Cloudflare secrets (gemini/openai = false)."
                echo "::warning::Генерирането на планове в приложението ползва aidiet worker — не спира деплой."
                echo "::warning::За standalone worker: добави GEMINI_API_KEY в GitHub Secrets или wrangler secret put."
              else
                echo "AI providers OK on aidiet-fitness."
              fi
              exit 0
            fi
            echo "Health check attempt $i failed (HTTP $status), retrying..."
            sleep 5
          done
          echo "::error::FitPlan health check failed after deploy"
          exit 1
