name: Plan Adequacy Tests

on:
  push:
    branches:
      - main
    paths:
      - 'KV/**'
      - 'plan-response-schemas.js'
      - 'worker.entry.js'
      - 'scripts/plan-adequacy/**'
      - 'food-catalog.js'
      - 'food-nutrition.js'
      - '.github/workflows/plan-adequacy-tests.yml'
  pull_request:
    paths:
      - 'KV/**'
      - 'plan-response-schemas.js'
      - 'worker.entry.js'
      - 'scripts/plan-adequacy/**'
      - 'food-catalog.js'
      - 'food-nutrition.js'
      - '.github/workflows/plan-adequacy-tests.yml'
  workflow_dispatch:
    inputs:
      run_live:
        description: 'Run live E2E against production (slow, uses AI quota)'
        type: boolean
        default: false

jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Plan adequacy (offline)
        run: npm run test:plan-adequacy

      - name: Universality stress (catalog pools)
        run: node test-universality-stress.mjs

  live:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_live == true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Live plan adequacy (3 profiles)
        run: npm run test:plan-adequacy:live -- --profiles=quick
        timeout-minutes: 90
