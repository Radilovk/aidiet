name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - 'worker.entry.js'
      - 'worker.js'
      - 'wrangler.toml'
      - 'fitness/worker.js'
      - 'fitness/exercise-labels-bg.js'
      - 'fitness/exercise-translate-batch.js'
      - 'fitness/exercise-translations.js'
      - 'fitness/normalize.js'
      - 'fitness/plan-generation.js'
      - 'fitness/profile-summary.js'
      - 'fitness/exercise-metadata.js'
      - 'fitness/exercise-synonyms.js'
      - 'fitness/exercise-classify-batch.js'
      - 'fitness/data/exercise-metadata.json'
      - 'food-catalog.js'
      - 'food-catalog-data.js'
      - 'food-utils.js'
      - 'food-nutrition.js'
      - 'food-nutrition-data.js'
      - 'context-compression.js'
      - 'analytics-compression.js'
      - 'json-patch.js'
      - 'client-card.js'
      - 'types/worker.d.ts'
      - 'tsconfig.worker.json'
      - 'scripts/typecheck-worker.mjs'
      - 'scripts/bundle-worker.mjs'
      - 'scripts/verify-worker.mjs'
      - 'KV/**'
      - 'plan-response-schemas.js'
      - 'scripts/plan-adequacy/**'
      - '.github/workflows/deploy-kv.yml'
      - '.github/workflows/deploy-worker.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'worker.entry.js'
      - 'worker.js'
      - 'wrangler.toml'
      - 'fitness/worker.js'
      - 'fitness/exercise-labels-bg.js'
      - 'fitness/exercise-translate-batch.js'
      - 'fitness/exercise-translations.js'
      - 'fitness/normalize.js'
      - 'fitness/plan-generation.js'
      - 'fitness/profile-summary.js'
      - 'fitness/exercise-metadata.js'
      - 'fitness/exercise-synonyms.js'
      - 'fitness/exercise-classify-batch.js'
      - 'fitness/data/exercise-metadata.json'
      - 'food-catalog.js'
      - 'food-catalog-data.js'
      - 'food-utils.js'
      - 'food-nutrition.js'
      - 'food-nutrition-data.js'
      - 'context-compression.js'
      - 'analytics-compression.js'
      - 'json-patch.js'
      - 'client-card.js'
      - 'types/worker.d.ts'
      - 'tsconfig.worker.json'
      - 'scripts/typecheck-worker.mjs'
      - 'scripts/bundle-worker.mjs'
      - 'scripts/verify-worker.mjs'
      - 'KV/**'
      - 'plan-response-schemas.js'
      - 'scripts/plan-adequacy/**'
      - '.github/workflows/deploy-kv.yml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Prevent running on PRs from forks as they don't have access to secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify worker (bundle + health)
        run: npm run test:worker

      - name: Upload deploy bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-deploy-bundle
          path: worker.js
          retention-days: 14

      # Create the queues if they do not yet exist in Cloudflare.
      # This step requires the Queues:Edit permission on CLOUDFLARE_API_TOKEN.
      - name: Create queues (idempotent)
        continue-on-error: true
        run: |
          set +e
          list_output=$(npx wrangler queues list 2>&1)
          list_exit=$?

          if echo "$list_output" | grep -qiE "Authentication error|code:\s*10000"; then
            echo "::warning::CLOUDFLARE_API_TOKEN lacks Queues:Edit permission – cannot create queues automatically."
            exit 0
          fi

          for queue_name in "plan-generation" "plan-generation-staging"; do
            if echo "$list_output" | grep -q "$queue_name"; then
              echo "Queue '$queue_name' already exists – skipping creation."
            else
              echo "Attempting to create queue '$queue_name'..."
              npx wrangler queues create "$queue_name"
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "Deploying PR to staging environment..."
            npx wrangler deploy --env staging
          else
            echo "Deploying to production..."
            npx wrangler deploy --env production
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify health after deploy
        if: github.event_name != 'pull_request'
        run: |
          for i in 1 2 3 4 5; do
            status=$(curl -sS -o /tmp/aidiet-health.json -w "%{http_code}" https://aidiet.radilov-k.workers.dev/api/health || true)
            if [ "$status" = "200" ]; then
              cat /tmp/aidiet-health.json
              exit 0
            fi
            echo "Health check attempt $i failed (HTTP $status), retrying..."
            sleep 5
          done
          echo "::error::aidiet worker health check failed after deploy"
          exit 1
