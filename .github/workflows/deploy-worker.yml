name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - 'worker.js'
      - 'wrangler.toml'
      - 'fitness/worker.js'
      - 'fitness/exercise-labels-bg.js'
      - 'fitness/exercise-translate-batch.js'
      - 'fitness/exercise-translations.js'
      - 'fitness/normalize.js'
      - 'fitness/plan-generation.js'
      - 'fitness/profile-summary.js'
      - 'fitness/data/exercise-translations-bg.json'
      - 'food-catalog.js'
      - 'food-catalog-data.js'
      - 'food-utils.js'
      - 'food-nutrition.js'
      - 'food-nutrition-data.js'
      - 'context-compression.js'
      - 'analytics-compression.js'
      - 'json-patch.js'
      - 'client-card.js'
      - 'scripts/bundle-worker.mjs'
      - '.github/workflows/deploy-worker.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'worker.js'
      - 'wrangler.toml'
      - 'fitness/worker.js'
      - 'fitness/exercise-labels-bg.js'
      - 'fitness/exercise-translate-batch.js'
      - 'fitness/exercise-translations.js'
      - 'fitness/normalize.js'
      - 'fitness/plan-generation.js'
      - 'fitness/profile-summary.js'
      - 'fitness/data/exercise-translations-bg.json'
      - 'food-catalog.js'
      - 'food-catalog-data.js'
      - 'food-utils.js'
      - 'food-nutrition.js'
      - 'food-nutrition-data.js'
      - 'context-compression.js'
      - 'analytics-compression.js'
      - 'json-patch.js'
      - 'client-card.js'
      - 'scripts/bundle-worker.mjs'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Prevent running on PRs from forks as they don't have access to secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify worker bundle
        run: npm run build:worker

      # Create the queues if they do not yet exist in Cloudflare.
      # This step requires the Queues:Edit permission on CLOUDFLARE_API_TOKEN.
      - name: Create queues (idempotent)
        continue-on-error: true
        run: |
          set +e
          list_output=$(npx wrangler queues list 2>&1)
          list_exit=$?

          if echo "$list_output" | grep -qiE "Authentication error|code:\s*10000"; then
            echo "::warning::CLOUDFLARE_API_TOKEN lacks Queues:Edit permission – cannot create queues automatically."
            exit 0
          fi

          for queue_name in "plan-generation" "plan-generation-staging"; do
            if echo "$list_output" | grep -q "$queue_name"; then
              echo "Queue '$queue_name' already exists – skipping creation."
            else
              echo "Attempting to create queue '$queue_name'..."
              npx wrangler queues create "$queue_name"
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "Deploying PR to staging environment..."
            npx wrangler deploy --env staging
          else
            echo "Deploying to production..."
            npx wrangler deploy --env production
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
