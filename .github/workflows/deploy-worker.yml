name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - 'worker.js'
      - 'wrangler.toml'
  pull_request:
    branches:
      - main
    paths:
      - 'worker.js'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Prevent running on PRs from forks as they don't have access to secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # Create the queue if it does not yet exist in Cloudflare.
      # This step requires the Queues:Edit permission on CLOUDFLARE_API_TOKEN.
      # If the token lacks that permission (auth error 10000) the step is skipped
      # gracefully so the deploy still runs.  The queue can also be created once
      # manually: wrangler queues create plan-generation
      - name: Create plan-generation queue (idempotent)
        continue-on-error: true
        run: |
          set +e
          list_output=$(npx wrangler queues list 2>&1)
          list_exit=$?
          if echo "$list_output" | grep -q "plan-generation"; then
            echo "Queue 'plan-generation' already exists – skipping creation."
            exit 0
          fi
          if echo "$list_output" | grep -qiE "Authentication error|code:\s*10000"; then
            echo "::warning::CLOUDFLARE_API_TOKEN lacks Queues:Edit permission – cannot create queue automatically. Create it manually: wrangler queues create plan-generation"
            exit 0
          fi
          if [ $list_exit -ne 0 ]; then
            echo "::warning::wrangler queues list failed (exit $list_exit) – attempting queue creation anyway."
          fi
          npx wrangler queues create plan-generation
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "Deploying PR to staging environment..."
            npx wrangler deploy --name aidiet-staging
          else
            echo "Deploying to production..."
            npx wrangler deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
