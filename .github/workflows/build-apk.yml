name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Prepare signing keystore
        id: keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > nutriplan.keystore
            echo "STORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"
            echo "IS_PROD=true" >> "$GITHUB_ENV"
          else
            echo "IS_PROD=false" >> "$GITHUB_ENV"
            echo "STORE_PASS=nutriplan-debug-pw" >> "$GITHUB_ENV"
            echo "KEY_PASS=nutriplan-debug-pw" >> "$GITHUB_ENV"
            keytool -genkeypair -v -keystore nutriplan.keystore -alias nutriplan -keyalg RSA -keysize 2048 -validity 10000 -storepass "nutriplan-debug-pw" -keypass "nutriplan-debug-pw" -dname "CN=NutriPlan" -noprompt
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Force Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          # Използваме абсолютни пътища от системата
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          echo "Bubblewrap configured with JDK: $JAVA_HOME and SDK: $ANDROID_SDK_ROOT"

      - name: Update Assetlinks and Sync
        if: env.IS_PROD == 'true'
        run: |
          # Use sed for reliable extraction regardless of leading whitespace/tab variations
          RAW_FINGERPRINT=$(keytool -list -v -keystore nutriplan.keystore -alias nutriplan -storepass "${{ env.STORE_PASS }}" | grep "SHA256:" | sed 's/.*SHA256: //' | tr -d '[:space:]')
          echo "Extracted SHA-256 fingerprint: $RAW_FINGERPRINT"

          # Validate: must be 32 uppercase hex pairs separated by colons
          if [ -z "$RAW_FINGERPRINT" ]; then
            echo "ERROR: Could not extract SHA-256 fingerprint from keystore" >&2
            exit 1
          fi
          if ! echo "$RAW_FINGERPRINT" | grep -qE '^([0-9A-F]{2}:){31}[0-9A-F]{2}$'; then
            echo "ERROR: Fingerprint does not match expected SHA-256 format: $RAW_FINGERPRINT" >&2
            exit 1
          fi

          node -e "
            const fs = require('fs');
            const filePath = '.well-known/assetlinks.json';
            const data = [{
              relation: ['delegate_permission/common.handle_all_urls'],
              target: {
                namespace: 'android_app',
                package_name: 'com.biocode.nutriplan',
                sha256_cert_fingerprints: [process.argv[1]]
              }
            }];
            fs.mkdirSync('.well-known', { recursive: true });
            fs.writeFileSync(filePath, JSON.stringify(data, null, 2) + '\n');
          " "$RAW_FINGERPRINT"

          echo "Updated assetlinks.json:"
          cat .well-known/assetlinks.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .well-known/assetlinks.json
          if git diff --cached --quiet; then
            echo "assetlinks.json unchanged, skipping commit"
          else
            git commit -m "chore: update assetlinks.json with signing certificate fingerprint [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.STORE_PASS }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ env.KEY_PASS }}
        run: |
          # Четем версията от twa-manifest.json
          V_NAME=$(node -p "require('./twa-manifest.json').appVersion")
          V_CODE=$(node -p "require('./twa-manifest.json').versionCode")
          
          # Подаваме версията и прескачаме валидацията
          printf "$V_NAME\n$V_CODE\n" | bubblewrap update --skipPwaValidation
          bubblewrap build --skipPwaValidation

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriPlan-APK
          path: "*.apk"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v-$(date +'%Y%m%d%H%M')"
          APK_FILE=$(find . -name "*release-signed.apk" | head -1)
          if [ -z "$APK_FILE" ]; then APK_FILE=$(find . -name "*.apk" | head -1); fi
          cp "$APK_FILE" NutriPlan.apk
          gh release create "$TAG" NutriPlan.apk --title "NutriPlan Build $TAG" --notes "Автоматичен билд."
