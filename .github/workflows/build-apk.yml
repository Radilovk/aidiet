name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - '!worker.js'
      - '**.png'
      - '**.svg'
      - '**.webp'
      - '**.ico'
      - 'twa-manifest.json'
      - 'capacitor.config.json'
      - 'android-res/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare signing keystore
        id: keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > nutriplan.keystore
            echo "STORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"
            echo "IS_PROD=true" >> "$GITHUB_ENV"
          else
            echo "IS_PROD=false" >> "$GITHUB_ENV"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Capacitor web shell
        run: |
          rm -rf capacitor-shell
          mkdir -p capacitor-shell
          rsync -a ./ capacitor-shell/ \
            --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'android/' \
            --exclude 'android-res/' \
            --exclude 'capacitor-shell/' \
            --include 'docs/' \
            --include 'docs/*.png' \
            --exclude 'docs/**' \
            --exclude 'workflows/' \
            --exclude 'KV/' \
            --exclude 'Plan1/' \
            --exclude 'Plan2/' \
            --exclude 'Protocols/' \
            --exclude 'clients/' \
            --exclude 'samples/' \
            --exclude '*.md' \
            --exclude '*.log' \
            --exclude '*.csv' \
            --exclude '*.keystore' \
            --exclude '*.py' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'twa-manifest.json' \
            --exclude 'capacitor.config.json' \
            --exclude 'wrangler.toml' \
            --exclude 'worker.js' \
            --exclude 'client_______________*.json' \
            --exclude 'Errorlist.txt' \
            --exclude 'ai_communication.txt' \
            --exclude 'aicom.txt' \
            --exclude 'dynaquest.txt' \
            --exclude 'log1' \
            --exclude 'workererrors'

      - name: Build APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/nutriplan.keystore
          ANDROID_KEY_ALIAS: nutriplan
        run: |
          V_NAME=$(node -p "require('./twa-manifest.json').appVersion")
          V_CODE=$(node -p "require('./twa-manifest.json').versionCode")
          ICON_SRC="icon-512x512.png"
          if [ ! -f "$ICON_SRC" ]; then ICON_SRC="icon-512.png"; fi

          npx cap add android

          # Replace default Capacitor icons with NutriPlan icon
          if ! command -v convert &>/dev/null; then
            echo "ImageMagick 'convert' not found – installing…" && sudo apt-get install -y imagemagick
          fi
          # Legacy launcher icons: resize PWA icon directly (maskable icon already has background)
          for entry in "48 mdpi" "72 hdpi" "96 xhdpi" "144 xxhdpi" "192 xxxhdpi"; do
            SIZE=${entry%% *}
            DPI=${entry##* }
            ICON_DIR="android/app/src/main/res/mipmap-${DPI}"
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "${ICON_DIR}/ic_launcher.png"
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "${ICON_DIR}/ic_launcher_round.png"
          done
          # Adaptive icon foreground (108dp base) — icon centered within safe zone (66% of canvas)
          for entry in "108 mdpi" "162 hdpi" "216 xhdpi" "324 xxhdpi" "432 xxxhdpi"; do
            SIZE=${entry%% *}
            DPI=${entry##* }
            ICON_DIR="android/app/src/main/res/mipmap-${DPI}"
            # Safe zone = 72dp of 108dp = 66.7% — icon must not exceed this or it gets clipped by launcher shapes
            SAFE=$((SIZE * 2 / 3))
            convert -size "${SIZE}x${SIZE}" xc:none \
              \( "$ICON_SRC" -resize "${SAFE}x${SAFE}" \) \
              -gravity center -composite "${ICON_DIR}/ic_launcher_foreground.png"
          done
          # Set adaptive icon background color to brand dark teal
          python3 - <<'PY_COLORS'
          from pathlib import Path
          import re
          colors_file = Path("android/app/src/main/res/values/colors.xml")
          bg_color = '#042F2E'
          entry_line = f'    <color name="ic_launcher_background">{bg_color}</color>'
          if colors_file.exists():
              content = colors_file.read_text()
              if 'ic_launcher_background' not in content:
                  content = content.replace('</resources>', entry_line + '\n</resources>')
              else:
                  content = re.sub(r'<color name="ic_launcher_background">#[0-9A-Fa-f]{3,8}</color>', entry_line.strip(), content)
              colors_file.write_text(content)
          else:
              colors_file.write_text(f'<?xml version="1.0" encoding="utf-8"?>\n<resources>\n{entry_line}\n</resources>\n')
          PY_COLORS

          npx cap sync android
          # Remove Capacitor-generated ic_launcher_background.xml to avoid duplicate with colors.xml
          rm -f android/app/src/main/res/values/ic_launcher_background.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          permissions = [
              '<uses-permission android:name="android.permission.CAMERA" />',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '<uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />',
              '<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />',
              '<uses-permission android:name="android.permission.WAKE_LOCK" />',
              '<uses-permission android:name="android.permission.VIBRATE" />',
          ]
          for permission in permissions:
              if permission not in text:
                  text = text.replace("<application", f"    {permission}\n\n    <application", 1)
          manifest.write_text(text)
          PY
          # Remove any PNG splash added by cap sync to avoid duplicate resource with splash.xml below
          rm -f android/app/src/main/res/drawable/splash.png
          mkdir -p android/app/src/main/res/values android/app/src/main/res/drawable android/app/src/main/res/drawable-night android/app/src/main/res/drawable-nodpi
          # Splash logo: plain icon resized (no white-circle overlay) — matches PWA appearance
          convert "$ICON_SRC" -resize 256x256 \
            android/app/src/main/res/drawable-nodpi/nutriplan_splash_logo.png
          convert "$ICON_SRC" -resize 96x96 -alpha extract -threshold 1% android/app/src/main/res/drawable/ic_stat_nutriplan.png
          for entry in "24 mdpi" "36 hdpi" "48 xhdpi" "72 xxhdpi" "96 xxxhdpi"; do
            SIZE=${entry%% *}
            DPI=${entry##* }
            DRAWABLE_DIR="android/app/src/main/res/drawable-${DPI}"
            mkdir -p "$DRAWABLE_DIR"
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" -alpha extract -threshold 1% "$DRAWABLE_DIR/ic_stat_nutriplan.png"
          done
          cat > android/app/src/main/res/values/nutriplan_splash_colors.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="backgroundColor">#042F2E</color>
          </resources>
          EOF
          cat > android/app/src/main/res/drawable/splash.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="#042F2E" />
                  </shape>
              </item>
              <item>
                  <bitmap
                      android:gravity="center"
                      android:src="@drawable/nutriplan_splash_logo" />
              </item>
          </layer-list>
          EOF
          cat > android/app/src/main/res/drawable-night/splash.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="#042F2E" />
                  </shape>
              </item>
              <item>
                  <bitmap
                      android:gravity="center"
                      android:src="@drawable/nutriplan_splash_logo" />
              </item>
          </layer-list>
          EOF
          grep -q "android-res/build-overrides.gradle" android/app/build.gradle || \
            printf "\napply from: '../../android-res/build-overrides.gradle'\n" >> android/app/build.gradle
          # Configure styles.xml: use Theme.SplashScreen for Android 12+ SplashScreen API
          python3 - <<'PY_STYLES'
          from pathlib import Path
          import re
          styles_file = Path("android/app/src/main/res/values/styles.xml")
          if styles_file.exists():
              content = styles_file.read_text()
              new_launch_style = (
                  '    <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">\n'
                  '        <item name="windowSplashScreenBackground">@color/backgroundColor</item>\n'
                  '        <item name="windowSplashScreenAnimatedIcon">@drawable/nutriplan_splash_logo</item>\n'
                  '        <item name="postSplashScreenTheme">@style/AppTheme.NoActionBar</item>\n'
                  '    </style>'
              )
              if 'AppTheme.NoActionBarLaunch' in content:
                  content = re.sub(
                      r'<style name="AppTheme\.NoActionBarLaunch"[^>]*>.*?</style>',
                      new_launch_style,
                      content, flags=re.DOTALL
                  )
              else:
                  # Insert before the last </resources> tag
                  idx = content.rfind('</resources>')
                  if idx != -1:
                      content = content[:idx] + new_launch_style + '\n</resources>'
                  else:
                      content += '\n' + new_launch_style + '\n'
              # Add navigation bar color to AppTheme.NoActionBar (light mode = white with dark icons)
              if 'AppTheme.NoActionBar' in content and 'navigationBarColor' not in content:
                  content = re.sub(
                      r'(<style\s+name="AppTheme\.NoActionBar"[^>]*>)',
                      r'\1\n        <item name="android:navigationBarColor">@android:color/white</item>\n        <item name="android:windowLightNavigationBar">true</item>',
                      content, flags=re.DOTALL
                  )
              styles_file.write_text(content)
              print("styles.xml updated with Theme.SplashScreen configuration and navigation bar color")
          else:
              print("WARNING: styles.xml not found — creating minimal version")
              styles_file.parent.mkdir(parents=True, exist_ok=True)
              styles_file.write_text(
                  '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n'
                  '    <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar"></style>\n'
                  '    <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.NoActionBar">\n'
                  '        <item name="windowActionBar">false</item>\n'
                  '        <item name="windowNoTitle">true</item>\n'
                  '        <item name="android:navigationBarColor">@android:color/white</item>\n'
                  '        <item name="android:windowLightNavigationBar">true</item>\n'
                  '    </style>\n'
                  '    <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">\n'
                  '        <item name="windowSplashScreenBackground">@color/backgroundColor</item>\n'
                  '        <item name="windowSplashScreenAnimatedIcon">@drawable/nutriplan_splash_logo</item>\n'
                  '        <item name="postSplashScreenTheme">@style/AppTheme.NoActionBar</item>\n'
                  '    </style>\n'
                  '</resources>\n'
              )
          # Create night-mode styles: dark navigation bar matching brand dark teal
          night_dir = Path("android/app/src/main/res/values-night")
          night_dir.mkdir(parents=True, exist_ok=True)
          (night_dir / "styles.xml").write_text(
              '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n'
              '    <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.NoActionBar">\n'
              '        <item name="android:navigationBarColor">#042F2E</item>\n'
              '        <item name="android:windowLightNavigationBar">false</item>\n'
              '    </style>\n'
              '</resources>\n'
          )
          print("values-night/styles.xml created with dark navigation bar")
          PY_STYLES

          cd android
          if [ "$IS_PROD" = "true" ]; then
            ./gradlew --no-daemon assembleRelease \
              -PaidietVersionName="$V_NAME" \
              -PaidietVersionCode="$V_CODE"
          else
            ./gradlew --no-daemon assembleDebug \
              -PaidietVersionName="$V_NAME" \
              -PaidietVersionCode="$V_CODE"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriPlan-APK
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v-$(date +'%Y%m%d%H%M')-$(git rev-parse --short HEAD)"
          if [ "$IS_PROD" = "true" ]; then
            APK_FILE="android/app/build/outputs/apk/release/app-release.apk"
          else
            APK_FILE="android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          cp "$APK_FILE" NutriPlan.apk
          gh release create "$TAG" NutriPlan.apk --title "NutriPlan Build $TAG" --notes "Автоматичен билд."
