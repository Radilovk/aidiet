name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare signing keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > nutriplan.keystore
            echo "AIDIET_STORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "AIDIET_KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"
          else
            echo "AIDIET_STORE_PASS=nutriplan-debug-pw" >> "$GITHUB_ENV"
            echo "AIDIET_KEY_PASS=nutriplan-debug-pw" >> "$GITHUB_ENV"
            keytool -genkeypair -v -keystore nutriplan.keystore -alias nutriplan -keyalg RSA -keysize 2048 -validity 10000 -storepass "nutriplan-debug-pw" -keypass "nutriplan-debug-pw" -dname "CN=NutriPlan" -noprompt
          fi
          echo "AIDIET_KEYSTORE_PATH=$GITHUB_WORKSPACE/nutriplan.keystore" >> "$GITHUB_ENV"
          echo "AIDIET_KEY_ALIAS=nutriplan" >> "$GITHUB_ENV"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Derive Android version metadata
        run: |
          echo "AIDIET_ANDROID_VERSION_NAME=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_ENV"
          echo "AIDIET_ANDROID_VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Generate Android project
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Patch Android manifest and Gradle config
        run: |
          # 1. Add SCHEDULE_EXACT_ALARM permission to the manifest if not already present.
          if ! grep -q 'SCHEDULE_EXACT_ALARM' android/app/src/main/AndroidManifest.xml; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />|' android/app/src/main/AndroidManifest.xml
          fi

          # 2. Apply version metadata and signing config via a committed override script.
          #    Gradle merges multiple android{} blocks, so appending a separate file is safe
          #    regardless of Capacitor template changes.
          echo "apply from: '../../android-res/build-overrides.gradle'" >> android/app/build.gradle

          # 3. Copy the notification small icon drawable into the generated project.
          cp android-res/ic_stat_nutriplan.xml android/app/src/main/res/drawable/ic_stat_nutriplan.xml

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriPlan-APK
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="android-v${AIDIET_ANDROID_VERSION_NAME}-${AIDIET_ANDROID_VERSION_CODE}"
          APK_FILE=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_FILE" NutriPlan.apk
          gh release create "$TAG" NutriPlan.apk --title "NutriPlan Android $TAG" --notes "Автоматичен Capacitor APK билд."
