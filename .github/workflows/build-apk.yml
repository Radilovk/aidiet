name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare signing keystore
        id: keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > nutriplan.keystore
            echo "STORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"
            echo "IS_PROD=true" >> "$GITHUB_ENV"
          else
            echo "IS_PROD=false" >> "$GITHUB_ENV"
            echo "STORE_PASS=nutriplan-debug-pw" >> "$GITHUB_ENV"
            echo "KEY_PASS=nutriplan-debug-pw" >> "$GITHUB_ENV"
            keytool -genkeypair -v -keystore nutriplan.keystore -alias nutriplan -keyalg RSA -keysize 2048 -validity 10000 -storepass "nutriplan-debug-pw" -keypass "nutriplan-debug-pw" -dname "CN=NutriPlan" -noprompt
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Capacitor web shell
        run: |
          rm -rf capacitor-shell
          mkdir -p capacitor-shell
          rsync -a ./ capacitor-shell/ \
            --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'android/' \
            --exclude 'android-res/' \
            --exclude 'capacitor-shell/' \
            --include 'docs/' \
            --include 'docs/*.png' \
            --exclude 'docs/**' \
            --exclude 'workflows/' \
            --exclude 'KV/' \
            --exclude 'Plan1/' \
            --exclude 'Plan2/' \
            --exclude 'Protocols/' \
            --exclude 'clients/' \
            --exclude 'samples/' \
            --exclude '*.md' \
            --exclude '*.log' \
            --exclude '*.csv' \
            --exclude '*.keystore' \
            --exclude '*.py' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'twa-manifest.json' \
            --exclude 'capacitor.config.json' \
            --exclude 'wrangler.toml' \
            --exclude 'worker.js' \
            --exclude 'client_______________*.json' \
            --exclude 'Errorlist.txt' \
            --exclude 'ai_communication.txt' \
            --exclude 'aicom.txt' \
            --exclude 'dynaquest.txt' \
            --exclude 'log1' \
            --exclude 'workererrors'

      - name: Build APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/nutriplan.keystore
          ANDROID_KEY_ALIAS: nutriplan
        run: |
          V_NAME=$(node -p "require('./twa-manifest.json').appVersion")
          V_CODE=$(node -p "require('./twa-manifest.json').versionCode")
          ICON_SRC="icon-512.png"
          if [ ! -f "$ICON_SRC" ]; then ICON_SRC="icon-512x512.png"; fi

          npx cap add android

          # Replace default Capacitor icons with NutriPlan icon
          if ! command -v convert &>/dev/null; then
            echo "ImageMagick 'convert' not found – installing…" && sudo apt-get install -y imagemagick
          fi
          for entry in "48 mdpi" "72 hdpi" "96 xhdpi" "144 xxhdpi" "192 xxxhdpi"; do
            SIZE=${entry%% *}
            DPI=${entry##* }
            ICON_DIR="android/app/src/main/res/mipmap-${DPI}"
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "${ICON_DIR}/ic_launcher.png"
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "${ICON_DIR}/ic_launcher_round.png"
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "${ICON_DIR}/ic_launcher_foreground.png"
          done

          npx cap sync android
          sed -i 's|<color name="backgroundColor">.*</color>|<color name="backgroundColor">#042F2E</color>|g' android/app/src/main/res/values/colors.xml || true
          mkdir -p android/app/src/main/res/drawable-night
          cat > android/app/src/main/res/drawable/splash.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@color/backgroundColor" />
              <item>
                  <bitmap
                      android:gravity="center"
                      android:src="@mipmap/ic_launcher" />
              </item>
          </layer-list>
          EOF
          cp android/app/src/main/res/drawable/splash.xml android/app/src/main/res/drawable-night/splash.xml
          grep -q "android-res/build-overrides.gradle" android/app/build.gradle || \
            printf "\napply from: '../../android-res/build-overrides.gradle'\n" >> android/app/build.gradle

          cd android
          ./gradlew --no-daemon assembleRelease \
            -PaidietVersionName="$V_NAME" \
            -PaidietVersionCode="$V_CODE"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriPlan-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v-$(date +'%Y%m%d%H%M')-$(git rev-parse --short HEAD)"
          APK_FILE="android/app/build/outputs/apk/release/app-release.apk"
          cp "$APK_FILE" NutriPlan.apk
          gh release create "$TAG" NutriPlan.apk --title "NutriPlan Build $TAG" --notes "Автоматичен билд."
