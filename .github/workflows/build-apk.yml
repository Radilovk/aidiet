name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare signing keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > nutriplan.keystore
            echo "AIDIET_STORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "AIDIET_KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"
          else
            echo "AIDIET_STORE_PASS=nutriplan-debug-pw" >> "$GITHUB_ENV"
            echo "AIDIET_KEY_PASS=nutriplan-debug-pw" >> "$GITHUB_ENV"
            keytool -genkeypair -v -keystore nutriplan.keystore -alias nutriplan -keyalg RSA -keysize 2048 -validity 10000 -storepass "nutriplan-debug-pw" -keypass "nutriplan-debug-pw" -dname "CN=NutriPlan" -noprompt
          fi
          echo "AIDIET_KEYSTORE_PATH=$GITHUB_WORKSPACE/nutriplan.keystore" >> "$GITHUB_ENV"
          echo "AIDIET_KEY_ALIAS=nutriplan" >> "$GITHUB_ENV"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Derive Android version metadata
        run: |
          echo "AIDIET_ANDROID_VERSION_NAME=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_ENV"
          echo "AIDIET_ANDROID_VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Generate Android project
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Patch Android manifest and Gradle config
        run: |
          python <<'PY'
          from pathlib import Path

          manifest_path = Path('android/app/src/main/AndroidManifest.xml')
          manifest = manifest_path.read_text()
          exact_alarm_permission = '    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n'
          if 'android.permission.SCHEDULE_EXACT_ALARM' not in manifest:
              manifest = manifest.replace('    <!-- Permissions -->\n\n', f'    <!-- Permissions -->\n\n{exact_alarm_permission}', 1)
          manifest_path.write_text(manifest)

          build_gradle_path = Path('android/app/build.gradle')
          build_gradle = build_gradle_path.read_text()
          build_gradle = build_gradle.replace(
              '        versionCode 1',
              '        versionCode Integer.parseInt(System.getenv("AIDIET_ANDROID_VERSION_CODE") ?: "1")'
          )
          build_gradle = build_gradle.replace(
              '        versionName "1.0"',
              '        versionName System.getenv("AIDIET_ANDROID_VERSION_NAME") ?: "1.0.0"'
          )
          old_block = """    buildTypes {\n        release {\n            minifyEnabled false\n            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n        }\n    }\n"""
          new_block = """    signingConfigs {\n        release {\n            storeFile file(System.getenv(\"AIDIET_KEYSTORE_PATH\"))\n            storePassword System.getenv(\"AIDIET_STORE_PASS\")\n            keyAlias System.getenv(\"AIDIET_KEY_ALIAS\") ?: \"nutriplan\"\n            keyPassword System.getenv(\"AIDIET_KEY_PASS\")\n        }\n    }\n    buildTypes {\n        debug {\n            signingConfig signingConfigs.release\n        }\n        release {\n            signingConfig signingConfigs.release\n            minifyEnabled false\n            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n        }\n    }\n"""
          if old_block not in build_gradle:
              raise SystemExit('Unexpected android/app/build.gradle template; signing block was not patched.')
          build_gradle = build_gradle.replace(old_block, new_block, 1)
          build_gradle_path.write_text(build_gradle)
          PY
          cp android-res/ic_stat_nutriplan.xml android/app/src/main/res/drawable/ic_stat_nutriplan.xml

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriPlan-APK
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="android-v${AIDIET_ANDROID_VERSION_NAME}-${AIDIET_ANDROID_VERSION_CODE}"
          APK_FILE=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_FILE" NutriPlan.apk
          gh release create "$TAG" NutriPlan.apk --title "NutriPlan Android $TAG" --notes "Автоматичен Capacitor APK билд."
