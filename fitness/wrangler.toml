# FitPlan AI — самостоятелен Cloudflare Worker (отделен от основния aidiet worker).
# Деплой:  cd fitness && npx wrangler deploy --env production
# Secrets: npx wrangler secret put GEMINI_API_KEY --env production
#          npx wrangler secret put OPENAI_API_KEY --env production   (по избор, fallback)

name = "aidiet-fitness"
main = "worker.js"
compatibility_date = "2024-11-01"

[env.staging]
name = "aidiet-fitness-staging"

# KV namespace трябва да се създаде еднократно:
#   npx wrangler kv namespace create FITNESS_KV
# и полученото id да се постави тук.
[[env.staging.kv_namespaces]]
binding = "FITNESS_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[env.production]
name = "aidiet-fitness"

[[env.production.kv_namespaces]]
binding = "FITNESS_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Незадължителни настройки (могат и през dashboard-а):
# [env.production.vars]
# GEMINI_MODEL = "gemini-2.5-flash"
# OPENAI_MODEL = "gpt-4o-mini"
# GEN_DAILY_LIMIT = "3"
# CHAT_DAILY_LIMIT = "30"
# EXERCISE_DATASET_URL = ""   # override на URL на базата с упражнения
# MEDIA_BASE_URL = ""         # override на CDN базата за GIF/thumbnail
