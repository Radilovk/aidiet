    <!-- Inline theme init: apply saved theme before first paint to prevent FOUC -->
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);var c=t==='dark'?'#0A1A1A':'#F0FDFA';document.querySelectorAll('meta[name="theme-color"]').forEach(function(m){m.setAttribute('content',c);});})();</script>
    <!-- Hide body until content is ready; revealed by JS after localStorage render to prevent flash -->
    <style>body{opacity:0}</style>
    <style>
        :root {
            --primary-red: #0D9488;
            --soft-red: #CCFBF1;
            --accent-yellow: #fbbf24;
            --accent-blue: #06B6D4;
            --accent-light-red: #f87171;
            --text-dark: #0F2F2E;
            --text-light: #6b7280;
            --bg-color: #F0FDFA;
            --card-bg: rgba(255, 255, 255, 0.72);
            --shadow: 0 4px 12px rgba(13,148,136,0.08);
            --radius: 24px;
            --glass-blur: 20px;
            --glass-border: rgba(13, 148, 136, 0.1);
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-inset-left: env(safe-area-inset-left, 0px);
            --safe-area-inset-right: env(safe-area-inset-right, 0px);
        }

        [data-theme="dark"] {
            --primary-red: #2DD4BF;
            --soft-red: #134E4A;
            --accent-yellow: #fcd34d;
            --accent-blue: #60a5fa;
            --accent-light-red: #fca5a5;
            --text-dark: #E0F5F0;
            --text-light: #9ca3af;
            --bg-color: #0A1A1A;
            --card-bg: rgba(20, 55, 55, 0.78);
            --shadow: 0 4px 12px rgba(0,0,0,0.25), 0 0 4px rgba(45,212,191,0.1);
            --radius: 24px;
            --glass-blur: 20px;
            --glass-border: rgba(45, 212, 191, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: calc(80px + var(--safe-area-inset-bottom));
        }

        /* --- PAGE HEADER --- */
        .page-header {
            background: var(--card-bg);
            padding: calc(18px + var(--safe-area-inset-top)) calc(16px + var(--safe-area-inset-right)) 14px calc(16px + var(--safe-area-inset-left));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
        }

        [data-theme="dark"] .page-header {
            background: rgba(20, 55, 55, 0.92);
            border-bottom-color: var(--glass-border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(13, 148, 136, 0.08);
            transform: translateX(-3px);
        }

        .page-header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.3px;
            flex: 1;
            text-align: center;
        }

        .theme-toggle-btn {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563eb 100%);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }

        .theme-toggle-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1) rotate(-8deg);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.5);
        }

        .theme-toggle-btn:active {
            transform: scale(0.95);
        }

        /* --- CONTAINER --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px 15px 15px;
        }

        /* --- GAME ANALYTICS SECTION --- */
        .game-analytics-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
        }
        .game-analytics-header {
            padding: 14px 18px;
            background: linear-gradient(135deg, #0D9488, #0F766E);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .game-analytics-title {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }
        .game-analytics-badge {
            font-size: 0.72rem;
            background: rgba(255,255,255,0.2);
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 600;
            white-space: nowrap;
        }
        .game-analytics-chevron {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
            opacity: 0.85;
        }
        .game-analytics-section.open .game-analytics-chevron {
            transform: rotate(180deg);
        }
        .game-analytics-body {
            padding: 14px 16px 16px;
        }
        /* Weekly overview card */
        .game-week-card {
            background: linear-gradient(135deg,#0D9488,#0F766E);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .game-week-icon { font-size: 1.7rem; line-height: 1; display:flex; align-items:center; justify-content:center; }
        .game-week-info { flex: 1; min-width: 0; }
        .game-week-title { font-size: 0.78rem; opacity: 0.85; font-weight: 500; }
        .game-week-score { font-size: 1.15rem; font-weight: 800; }
        .game-week-sub   { font-size: 0.72rem; opacity: 0.8; margin-top: 2px; }
        /* 7-day dot strip */
        .game-week-dots { display:flex; gap:4px; margin-top: 7px; }
        .game-week-dot  {
            width:14px; height:14px; border-radius:50%;
            background:#e5e7eb; cursor:default;
            border: 2px solid rgba(255,255,255,0.22);
        }
        /* Health score ring */
        .game-health-ring-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .game-ring-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .game-ring-svg { transform: rotate(-90deg); }
        .game-ring-bg  { fill: none; stroke: rgba(13,148,136,0.12); }
        .game-ring-fg  { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1); }
        .game-ring-label { font-size: 0.68rem; font-weight: 600; color: var(--text-light); text-align: center; }
        /* Index rows */
        .game-index-row {
            margin-bottom: 12px;
            cursor: pointer;
            border-radius: 10px;
            padding: 8px 10px;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .game-index-row:hover { background: rgba(13,148,136,0.06); }
        .game-index-row:active { background: rgba(13,148,136,0.1); }
        .game-index-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        .game-index-hint {
            font-size: 0.68rem;
            color: var(--text-light, #6b7280);
            margin-bottom: 4px;
        }
        .game-index-bar-wrap {
            height: 8px;
            background: var(--soft-red);
            border-radius: 999px;
            overflow: hidden;
        }
        .game-index-bar {
            height: 100%;
            border-radius: 999px;
            transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        /* Day-by-day mini bar chart */
        .game-day-dots { display:flex; gap:3px; margin-top:6px; align-items:flex-end; height:52px; }
        .game-day-col  { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:2px; min-width:0; }
        .game-day-dot  {
            width: 100%;
            max-width: 20px;
            border-radius: 3px 3px 0 0;
            min-height: 4px;
            transition: height 0.5s ease;
        }
        /* Calorie target bar chart */
        .game-day-dots-cal {
            display:flex; gap:3px; margin-top:6px; height:52px;
            position:relative; align-items:flex-end;
        }
        .game-cal-target-line {
            position:absolute; left:0; right:0; height:2px;
            background:rgba(107,114,128,0.5);
            border-radius:999px; pointer-events:none; z-index:1;
        }
        [data-theme="dark"] .game-cal-target-line { background:rgba(200,200,200,0.28); }
        /* Correlation insights */
        .game-insight-card {
            background: rgba(13,148,136,0.06);
            border-radius: 12px;
            padding: 10px 13px;
            margin-bottom: 10px;
            border-left: 3px solid #0D9488;
            font-size: 0.8rem;
            color: var(--text-dark);
            line-height: 1.5;
        }
        .game-insight-card .game-insight-icon {
            font-size: 1rem;
            margin-right: 5px;
        }
        .game-insight-card strong { color: #0D9488; }
        /* Scenario/prediction card */
        .game-scenario-card {
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.07));
            border-radius: 12px;
            padding: 11px 13px;
            margin-bottom: 10px;
            border: 1.5px solid rgba(99,102,241,0.2);
            font-size: 0.8rem;
            color: var(--text-dark);
            line-height: 1.5;
        }
        .game-scenario-card .game-scenario-label {
            font-size: 0.68rem;
            font-weight: 700;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        /* Alert card */
        .game-alert-card {
            background: rgba(245,158,11,0.08);
            border-radius: 12px;
            padding: 10px 13px;
            margin-bottom: 10px;
            border-left: 3px solid #f59e0b;
            font-size: 0.8rem;
            color: var(--text-dark);
            line-height: 1.5;
        }
        /* No-data days note */
        .game-no-data-note {
            font-size: 0.75rem;
            color: var(--text-gray);
            text-align: center;
            padding: 6px 0;
            opacity: 0.8;
        }
        /* Encouragement note */
        .game-encourage-note {
            background: rgba(13,148,136,0.07);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--text-dark);
            line-height: 1.5;
            margin-top: 12px;
            border-left: 3px solid #0D9488;
        }
        .game-weekly-info {
            font-size: 0.72rem;
            color: var(--text-light, #6b7280);
            margin-top: 9px;
            text-align: right;
        }
        /* Section divider */
        .game-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin: 14px 0 8px;
        }
        /* Metrics collapsible toggle */
        .game-metrics-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 7px 4px 7px 0;
            margin: 10px 0 4px;
            border-top: 1px solid rgba(13,148,136,0.15);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            border-radius: 6px;
        }
        .game-metrics-toggle:hover { background: rgba(13,148,136,0.05); }
        .game-metrics-chevron {
            font-size: 0.72rem;
            color: var(--text-light);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }
        [data-theme="dark"] .game-metrics-toggle { border-top-color: rgba(45,212,191,0.12); }
        /* Explanation modal */
        .game-explain-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            z-index: 3000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            animation: geFade 0.25s ease;
        }
        @keyframes geFade { from{opacity:0} to{opacity:1} }
        .game-explain-box {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px 18px 16px;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: gePop 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes gePop {
            from { opacity:0; transform:scale(0.8) translateY(20px); }
            to   { opacity:1; transform:scale(1) translateY(0); }
        }
        .game-explain-title { font-size:0.95rem; font-weight:700; color:var(--text-dark); margin-bottom:9px; }
        .game-explain-text  { font-size:0.82rem; color:var(--text-dark); opacity:0.8; line-height:1.6; }
        .game-explain-close {
            margin-top:12px; width:100%; padding:10px;
            border:none; border-radius:12px;
            background:linear-gradient(135deg,#0D9488,#0F766E);
            color:white; font-weight:700; cursor:pointer; font-size:0.85rem;
        }
        /* Dark theme overrides */
        [data-theme="dark"] .game-analytics-section { border-color: rgba(45,212,191,0.15); }
        [data-theme="dark"] .game-index-bar-wrap    { background: rgba(45,212,191,0.1); }
        [data-theme="dark"] .game-encourage-note    { background: rgba(45,212,191,0.07); border-color: rgba(45,212,191,0.4); }
        [data-theme="dark"] .game-insight-card      { background: rgba(45,212,191,0.07); border-color: rgba(45,212,191,0.4); }
        [data-theme="dark"] .game-scenario-card     { background: rgba(99,102,241,0.1); border-color: rgba(139,92,246,0.25); }
        [data-theme="dark"] .game-alert-card        { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.5); }
        [data-theme="dark"] .game-ring-bg           { stroke: rgba(45,212,191,0.15); }

        /* Entrance & visual animations */
        @keyframes gaCardIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }
        .ga-card-enter {
            animation: gaCardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .game-week-card {
            position: relative;
            overflow: hidden;
        }
        .game-week-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.13) 50%, transparent 70%);
            animation: gaWeekShimmer 3.8s ease-in-out 0.6s infinite;
            pointer-events: none;
        }
        @keyframes gaWeekShimmer {
            0%        { transform: translateX(-120%); }
            55%, 100% { transform: translateX(120%);  }
        }
        .game-week-dot {
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s ease;
        }
        .game-week-dot:hover {
            transform: scale(1.35);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .game-index-bar {
            transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        .game-day-dot {
            transition: height 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
        }
        .game-ring-wrap {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .game-ring-wrap:hover { transform: scale(1.06); }
        .game-index-row {
            transition: background 0.2s ease, transform 0.18s ease;
        }
        .game-index-row:hover { transform: translateX(4px); }
        .game-insight-card,
        .game-alert-card,
        .game-scenario-card {
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .game-insight-card:hover,
        .game-scenario-card:hover {
            transform: translateX(4px);
            box-shadow: 0 3px 14px rgba(13, 148, 136, 0.12);
        }
        .game-alert-card:hover {
            transform: translateX(4px);
            box-shadow: 0 3px 14px rgba(245, 158, 11, 0.14);
        }

        /* No-data message */
        .ga-no-data {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .ga-no-data i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: calc(60px + var(--safe-area-inset-bottom));
            padding: 0 8px var(--safe-area-inset-bottom);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-top: 1px solid rgba(13, 148, 136, 0.1);
            box-shadow: 0 -2px 16px rgba(0, 0, 0, 0.06), 0 -1px 0 rgba(13, 148, 136, 0.06);
            transform: translateZ(0);
        }
        [data-theme="dark"] .bottom-nav {
            background: rgba(8, 22, 22, 0.96);
            border-top: none;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.5), 0 -1px 0 rgba(45, 212, 191, 0.08);
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 7px 18px;
            min-width: 64px;
            border-radius: 16px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-family: inherit;
            font-size: 10px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.15s ease, background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .bottom-nav-item i {
            font-size: 20px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .bottom-nav-item.active {
            color: var(--primary-red);
            background: rgba(13, 148, 136, 0.1);
        }
        [data-theme="dark"] .bottom-nav-item.active {
            background: rgba(45, 212, 191, 0.15);
            color: var(--primary-red);
        }
        .bottom-nav-item.active i { transform: scale(1.1); }
        .bottom-nav-item:active { transform: scale(0.92); }
        .bottom-nav-item:hover:not(.active) {
            background: rgba(13, 148, 136, 0.05);
        }
    </style>
    <script>
        // Apply color scheme from admin settings
        (function() {
            const colorSchemes = {
                'purple-pink': {
                    light: { '--primary-red': '#0D9488', '--soft-red': '#CCFBF1' },
                    dark:  { '--primary-red': '#2DD4BF', '--soft-red': '#134E4A' }
                },
                'green-blue': {
                    light: { '--primary-red': '#4CAF50', '--soft-red': '#E8F5E9' },
                    dark:  { '--primary-red': '#66BB6A', '--soft-red': '#1B5E20' }
                },
                'blue-indigo': {
                    light: { '--primary-red': '#3B82F6', '--soft-red': '#EFF6FF' },
                    dark:  { '--primary-red': '#60A5FA', '--soft-red': '#1E3A8A' }
                },
                'orange-red': {
                    light: { '--primary-red': '#F97316', '--soft-red': '#FFF7ED' },
                    dark:  { '--primary-red': '#FB923C', '--soft-red': '#7C2D12' }
                }
            };
            function applyColorScheme() {
                const savedScheme = localStorage.getItem('colorScheme') || 'purple-pink';
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                const colors = colorSchemes[savedScheme]?.[currentTheme];
                if (colors) {
                    const root = document.documentElement;
                    Object.keys(colors).forEach(key => { root.style.setProperty(key, colors[key]); });
                }
            }
            applyColorScheme();
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'data-theme') {
                        applyColorScheme();
                    }
                });
            });
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        })();
    </script>
</head>
<body>
    <!-- Page Header -->
    <header class="page-header">
        <button class="back-btn" onclick="history.back()" aria-label="Назад"><i class="fas fa-arrow-left"></i></button>
        <h1>Текущ Анализ</h1>
        <button class="theme-toggle-btn" onclick="toggleTheme()" title="Смени тема" aria-label="Смени тема"><i class="fas fa-moon" id="themeIcon"></i></button>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="game-analytics-section open" id="gameAnalyticsSection">
            <div class="game-analytics-header" onclick="toggleGameAnalytics()" role="button" tabindex="0" aria-expanded="true" aria-controls="gameAnalyticsBody" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleGameAnalytics();}">
                <div class="game-analytics-title">
                    <i class="fas fa-brain"></i>
                    <span>Текущ Анализ</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span id="gameAnalyticsBadge" class="game-analytics-badge"></span>
                    <i class="fas fa-chevron-up game-analytics-chevron" id="gameAnalyticsChevron"></i>
                </div>
            </div>
            <div class="game-analytics-body" id="gameAnalyticsBody">
                <p style="color:var(--text-light);font-style:italic;font-size:0.85rem;">Зареждане…</p>
            </div>
        </div>
    </div>

    <script>
        function setThemeColor(theme) {
            var c = theme === 'dark' ? '#0A1A1A' : '#F0FDFA';
            document.querySelectorAll('meta[name="theme-color"]').forEach(function(m){m.setAttribute('content',c);});
                if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
                    var navBar = (window.Capacitor.Plugins || {}).NavigationBar;
                    if (navBar && navBar.setNavigationBarColor) {
                        navBar.setNavigationBarColor({ color: c });
                    }
                }
            }
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
            setThemeColor(newTheme);
        }
        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
        // Apply correct icon on load
        (function() {
            var t = document.documentElement.getAttribute('data-theme') || 'light';
            updateThemeIcon(t);
        })();

        function toggleGameAnalytics() {
            var section = document.getElementById('gameAnalyticsSection');
            var body    = document.getElementById('gameAnalyticsBody');
            var chevron = document.getElementById('gameAnalyticsChevron');
            var header  = section ? section.querySelector('.game-analytics-header') : null;
            if (!section || !body) return;
            var isOpen = body.style.display !== 'block';
            body.style.display = isOpen ? 'block' : 'none';
            section.classList.toggle('open', isOpen);
            if (chevron) chevron.className = 'fas game-analytics-chevron ' + (isOpen ? 'fa-chevron-up' : 'fa-chevron-down');
            if (header)  header.setAttribute('aria-expanded', String(isOpen));
        }

        function toggleDetailedMetrics() {
            var details = document.getElementById('gameMetricsDetails');
            var chevron = document.getElementById('gameMetricsChevron');
            var toggle  = document.getElementById('gameMetricsToggle');
            if (!details) return;
            var isOpen = details.style.display !== 'block';
            details.style.display = isOpen ? 'block' : 'none';
            if (chevron) chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
            if (toggle)  toggle.setAttribute('aria-expanded', String(isOpen));

            if (isOpen) {
                details.querySelectorAll('.ga-card-enter').forEach(function(el, i) {
                    el.style.animation = 'none';
                    void el.offsetWidth;
                    el.style.animation = '';
                    el.style.animationDelay = (i * 0.07) + 's';
                });
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        details.querySelectorAll('[data-ga-bar]').forEach(function(el, i) {
                            el.style.width = '0%';
                            setTimeout(function() {
                                el.style.width = el.getAttribute('data-ga-bar') + '%';
                            }, 60 + i * 60);
                        });
                        function animateBarHeight(selector, baseDelay) {
                            details.querySelectorAll(selector).forEach(function(el, i) {
                                el.style.height = '0px';
                                setTimeout(function() {
                                    el.style.height = el.getAttribute(selector.slice(1, -1));
                                }, baseDelay + i * 25);
                            });
                        }
                        animateBarHeight('[data-ga-bar-h]', 100);
                    });
                });
            }
        }
    </script>

    <script src="./game-analytics.js"></script>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" aria-label="Основна навигация">
        <a href="index.html?stay=1" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Начало</span>
        </a>
        <a href="plan.html" class="bottom-nav-item">
            <i class="fas fa-utensils"></i>
            <span>Моят План</span>
        </a>
        <a href="guidelines.html" class="bottom-nav-item">
            <i class="fas fa-compass"></i>
            <span>Насоки</span>
        </a>
        <a href="profile.html" class="bottom-nav-item">
            <i class="fas fa-user"></i>
            <span>Профил</span>
        </a>
    </nav>
    <!-- Embedded mode: when running inside app.html shell, hide own nav and intercept navigation -->
    <script>
    (function() {
        if (window.self === window.top) return;
        document.body.classList.add('spa-embedded');
        document.querySelectorAll('.bottom-nav, .fab-chat, .fab-food').forEach(function(el) {
            el.style.display = 'none';
        });
        document.querySelectorAll('.container, #main-content').forEach(function(el) {
            el.style.paddingBottom = '32px';
        });
        var tabMap = {
            'plan.html':         'plan',
            'guidelines.html':   'guidelines',
            'profile.html':      'profile',
            'index.html?stay=1': 'home'
        };
        document.addEventListener('click', function(e) {
            var a = e.target.closest('a[href]');
            if (!a) return;
            var href = (a.getAttribute('href') || '').replace(/^\.\//, '');
            var tab = tabMap[href];
            if (tab) {
                e.preventDefault();
                window.parent.postMessage({ type: 'SWITCH_TAB', tab: tab }, '*');
            }
        }, true);
    })();
    </script>
</body>
</html>
