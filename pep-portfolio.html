<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Портфолио Пептиди — професионален каталог с научно обосновани пептидни терапии.">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#F7F9FC">
<title>Портфолио Пептиди</title>
<style>
    body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #F7F9FC;
        color: #5A6578;
    }
    .portfolio-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 12px;
        padding: 24px;
        text-align: center;
    }
    .portfolio-loader strong {
        color: #0B3D3A;
        font-size: 1.1rem;
    }
</style>
</head>
<body>
<div class="portfolio-loader" id="loader">
    <strong>Портфолио Пептиди</strong>
    <span>Зареждане на актуалния каталог…</span>
</div>
<script>
(function() {
    var API = 'https://aidiet.radilov-k.workers.dev/api/pep/portfolio';
    var FALLBACK = 'pep-portfolio-static.html';

    function showPublished(html) {
        document.open();
        document.write(html);
        document.close();
    }

    fetch(API, { cache: 'no-store' })
        .then(function(response) {
            return response.ok ? response.json() : Promise.reject(new Error('not-published'));
        })
        .then(function(payload) {
            if (!payload || !payload.html) {
                throw new Error('empty');
            }
            showPublished(payload.html);
        })
        .catch(function() {
            window.location.replace(FALLBACK);
        });
})();
</script>
</body>
</html>
