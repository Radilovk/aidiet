<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портфолио Пептиди</title>
<style>
body{margin:0;font-family:Inter,system-ui,sans-serif;background:#F7F9FC;color:#5A6578}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:24px;text-align:center}
.loader strong{color:#0B3D3A;font-size:1.1rem}
</style>
</head>
<body>
<div class="loader" id="loader">
    <strong>Портфолио Пептиди</strong>
    <span>Зареждане…</span>
</div>
<script>
fetch('https://aidiet.radilov-k.workers.dev/api/pep/portfolio', { cache: 'no-store' })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function(data) {
        if (!data || !data.html) throw new Error('empty');
        document.open();
        document.write(data.html);
        document.close();
    })
    .catch(function() {
        document.getElementById('loader').innerHTML =
            '<strong>Портфолио Пептиди</strong><span>Каталогът все още не е публикуван. Публикувай от pep.html.</span>';
    });
</script>
</body>
</html>
