">от 5 mg</span>\n                    <span class=\"catalog-price\"><span class=\"catalog-price-from\">от</span>31.95 €</span>\n                </summary>\n                <div class=\"product-details\">\n                    <p class=\"product-tagline\">Двойно действие срещу глада и инсулиновата резистентност</p>\n                    <p class=\"marketing-text\">Тирзепатидът е революционен пептид, който работи на два фронта едновременно — намалява апетита и подобрява начина, по който тялото обработва захарта. Клиентите усещат по-бързо насищане, по-малко тревожност от храна и по-лесно спазване на калориен дефицит без постоянна борба с глада.</p>\n                    \n            <div class=\"science-block\">\n                <div class=\"science-label\">Научна основа</div>\n                <p class=\"science-text\">Двойен GLP-1/GIP рецепторен агонист. Клинични изследвания (SURMOUNT) показват средна загуба на тегло до 22.5% при продължителна употреба. Забавя гастропразненето и подобрява инсулиновата чувствителност.</p>\n            </div>\n                    \n            <ul class=\"benefits-list\"><li>Драстично намаляване на апетита</li><li>Подобрена гликемична контрола</li><li>Устойчива загуба на мазнини</li><li>Веднъж седмично приложение</li></ul>\n                    <div class=\"protocol\">Старт: 2.5 mg подкожно веднъж седмично. Титрация до 5–15 mg според толерантност и цел.</div>\n                    \n                    <div class=\"variants-title\">Налични дозировки & цени</div>\n                    \n            <div class=\"variant-row\">\n                <span class=\"variant-dose\">5 mg</span>\n                <span class=\"variant-price\">31.95 €</span>\n            </div>\n        \n            <div class=\"variant-row\">\n                <span class=\"variant-dose\">10 mg</span>\n                <span class=\"variant-price\">51.13 €</span>\n            </div>\n        \n            <div class=\"variant-row\">\n                <span class=\"variant-dose\">30 mg</span>\n                <span class=\"variant-price\">127.83 €</span>\n            </div>\n        \n                </div>\n            </details>\n        \n            <details class=\"product\">\n                <summary class=\"catalog-item-summary\">\n                    <span class=\"catalog-name-wrap\">\n                        <span class=\"catalog-name\">Retatrutide</span>\n                        <span class=\"product-badge\">Топ избор</span>\n                    </span>\n                    <span class=\"catalog-dose\">от 5 mg</span>\n                    <span class=\"catalog-price\"><span class=\"catalog-price-from\">от</span>38.35 €</span>\n                </summary>\n                <div class=\"product-details\">\n                    <p class=\"product-tagline\">Тройна мощ — най-агресивният метаболитен ускорител</p>\n                    <p class=\"marketing-text\">Retatrutide е следващото поколение в метаболитната терапия. За разлика от класическите GLP-1 агенти, той активира три хормонални пътя едновременно — не само намалява глада, но и директно ускорява изгарянето на мазнини и повишава енергийния разход дори в покой.</p>\n                    \n            <div class=\"science-block\">\n                <div class=\"science-label\">Научна основа</div>\n                <p class=\"science-text\">Тройна GLP-1/GIP/Glucagon рецепторна агонистична активност. Фаза II данни (Eli Lilly) демонстрират до 24% загуба на телесно тегло за 48 седмици — най-високият резултат сред всички тествани агенти.</p>\n            </div>\n                    \n            <ul class=\"benefits-list\"><li>Максимално изгаряне на мазнини</li><li>Повишен базов метаболизъм (BMR)</li><li>Синергия на три хормонални пътя</li><li>Налични дози: 5 / 10 / 20 mg</li></ul>\n                    <div class=\"protocol\">Старт: 2 mg подкожно веднъж седмично. Постепенна титрация до 4–12 mg. Изберете дозировката според целта и опита.</div>\n                    \n            <a class=\"p t\">\n                <summary class=\"catalog-item-summary\">\n                    <span class=\"catalog-name-wrap\">\n                        <span class=\"catalog-name\">GHK-Cu</span>\n                        <span class=\"product-badge\">Меден пептид</span>\n                    </span>\n                    <span class=\"catalog-dose\">100 mg</span>\n                    <span class=\"catalog-price\">31.95 €</span>\n                </summary>\n                <div class=\"product-details\">\n                    <p class=\"product-tagline\">Колаген, коса, кожа — клетъчен ремонт</p>\n                    <p class=\"marketing-text\">GHK-Cu (меден пептид) е един от най-изследваните пептиди за естетика. Стимулира производството на колаген и еластин, удебелява косата, заздравява ноктите и изглажда бръчките — на клетъчно, не повърхностно ниво.</p>\n                    \n            <div class=\"science-block\">\n                <div class=\"science-label\">Научна основа</div>\n                <p class=\"science-text\">Трипептид Gly-His-Lys с меден комплекс. Активира 4000+ гена свързани с регенерация. Стимулира фибробласти, ангиогенеза и антиоксидантна защита. Нива спадат от 200 ng/mL (20 г.) до 80 ng/mL (60 г.).</p>\n            </div>\n                    \n            <ul class=\"benefits-list\"><li>Стимулиране на колаген и еластин</li><li>Заздравяване на коса и нокти</li><li>Изглаждане на бръчки</li><li>Тъканна регенерация</li></ul>\n                    <div class=\"protocol\">1–2 mg подкожно дневно. Видими резултати след 4–8 седмици.</div>\n                    \n                    \n                    \n            <div class=\"variant-row\">\n                <span class=\"variant-dose\">100 mg</span>\n                <span class=\"variant-price\">31.95 €</span>\n            </div>\n        \n                </div>\n            </details>\n        \n            <details class=\"product\">\n                <summary class=\"catalog-item-summary\">\n     function hideLoader() {
        var el = document.getElementById('portfolio-loader');
        if (el) { el.classList.add('hidden'); setTimeout(function() { el.remove(); }, 500); }
    }

    function renderHtml(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        document.title = doc.title || document.title;
        doc.querySelectorAll('link[rel="preconnect"], link[href*="fonts"]').forEach(function(l) {
            if (!document.querySelector('link[href="' + l.getAttribute('href') + '"]'))
                document.head.appendChild(l.cloneNode(true));
        });
        doc.querySelectorAll('style').forEach(function(s) {
            document.head.appendChild(s.cloneNode(true));
        });
        document.body.innerHTML = doc.body.innerHTML;
        hideLoader();
    }

    fetch(API)
        .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function(data) { renderHtml(data.html); })
        .catch(function() { renderHtml(FALLBACK); });
})();
