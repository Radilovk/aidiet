<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0D9488">
    <title>Избор на продукти — NutriPlan (тест)</title>
    <!-- Design System 2026 -->
    <link rel="stylesheet" href="./design-system.css">
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Inline theme init: apply saved theme before first paint to prevent FOUC -->
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        :root {
            --primary: #0D9488;
            --primary-dark: #0F766E;
            --primary-light: #CCFBF1;
            --accent: #06B6D4;
            --bg: #F0FDFA;
            --card-bg: rgba(255,255,255,0.82);
            --text-dark: #0F2F2E;
            --text-gray: #4b5563;
            --border: rgba(13,148,136,0.15);
            --shadow: 0 10px 30px rgba(13,148,136,0.12);
            --radius: 18px;
            --transition: all 0.25s cubic-bezier(0.25,0.8,0.25,1);
        }
        [data-theme="dark"] {
            --bg: #0a1f1e;
            --card-bg: rgba(15,47,46,0.85);
            --text-dark: #e2f8f5;
            --text-gray: #94a3b8;
            --border: rgba(45,212,191,0.15);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 0 0 100px;
        }

        /* ── Header ── */
        .fp-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            padding: 28px 20px 24px;
            text-align: center;
        }
        .fp-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }
        .fp-header p {
            font-size: 0.9rem;
            opacity: 0.88;
            margin-top: 6px;
        }

        /* ── Sticky counter bar ── */
        .fp-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .fp-bar-count {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--primary);
        }
        .fp-bar-count span {
            font-size: 1.15rem;
            font-weight: 800;
        }
        .btn-clear-all {
            font-size: 0.8rem;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-gray);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-clear-all:hover { background: var(--primary-light); color: var(--primary); }

        /* ── Content ── */
        .fp-content {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Category accordion ── */
        .fp-category {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .fp-category summary {
            list-style: none;
            cursor: pointer;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1rem;
            user-select: none;
            transition: var(--transition);
        }
        .fp-category summary::-webkit-details-marker { display: none; }
        .fp-category summary:hover { background: var(--primary-light); }
        .fp-category[open] summary { border-bottom: 1px solid var(--border); }
        .cat-icon { font-size: 1.25rem; }
        .cat-label { flex: 1; }
        .cat-badge {
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--primary);
            color: #fff;
            border-radius: 12px;
            padding: 2px 8px;
            min-width: 22px;
            text-align: center;
        }
        .cat-badge[data-count="0"] { background: #d1d5db; }
        .cat-chevron {
            font-size: 0.75rem;
            color: var(--text-gray);
            transition: transform 0.25s;
        }
        .fp-category[open] .cat-chevron { transform: rotate(180deg); }

        /* ── Category toolbar ── */
        .cat-toolbar {
            display: flex;
            gap: 8px;
            padding: 10px 18px 8px;
            border-bottom: 1px solid var(--border);
        }
        .btn-cat {
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-gray);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-cat:hover, .btn-cat:focus { background: var(--primary-light); color: var(--primary); outline: none; }

        /* ── Food grid ── */
        .fp-foods {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            padding: 12px 18px 16px;
        }

        /* ── Checkbox item ── */
        .fp-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }
        .fp-item:hover { border-color: var(--primary); background: var(--primary-light); }
        .fp-item input[type="checkbox"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .fp-item.checked {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .fp-item-name {
            font-size: 0.85rem;
            line-height: 1.3;
            font-weight: 500;
        }

        /* ── Submit button ── */
        .fp-submit-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px));
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            z-index: 200;
        }
        .btn-submit {
            flex: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        /* ── Debug panel ── */
        .fp-debug {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px 20px;
        }
        .fp-debug-box {
            background: #0f172a;
            color: #4ade80;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            border-radius: 12px;
            padding: 14px 16px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 220px;
            overflow-y: auto;
            display: none;
        }
        .fp-debug-box.visible { display: block; }
        .fp-debug-label {
            font-size: 0.78rem;
            color: var(--text-gray);
            margin-bottom: 6px;
            font-weight: 600;
        }

        /* ── Toast notification ── */
        .fp-toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--primary);
            color: #fff;
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(13,148,136,0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 300;
            white-space: nowrap;
        }
        .fp-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .fp-toast.error { background: #ef4444; }
        .fp-toast.success { background: #16a34a; }

        /* ── Loading overlay ── */
        .fp-loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,47,46,0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 500;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 18px;
        }
        .fp-loading.active { display: flex; }
        .fp-loading-spinner {
            width: 52px;
            height: 52px;
            border: 5px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: fp-spin 0.8s linear infinite;
        }
        @keyframes fp-spin { to { transform: rotate(360deg); } }
        .fp-loading-text {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            padding: 0 20px;
        }
        .fp-loading-sub {
            color: rgba(255,255,255,0.75);
            font-size: 0.82rem;
            text-align: center;
            padding: 0 20px;
        }

        /* ── Error banner ── */
        .fp-error-banner {
            display: none;
            max-width: 680px;
            margin: 0 auto 0;
            padding: 0 16px;
        }
        .fp-error-banner.visible { display: block; }
        .fp-error-box {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.88rem;
            line-height: 1.5;
        }
        [data-theme="dark"] .fp-error-box {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.35);
            color: #fca5a5;
        }

        @media (max-width: 440px) {
            .fp-foods { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- Loading overlay -->
<div class="fp-loading" id="fpLoading">
    <div class="fp-loading-spinner"></div>
    <div class="fp-loading-text" id="fpLoadingText">Запазване на продуктите…</div>
    <div class="fp-loading-sub">Моля, изчакай</div>
</div>

<div class="fp-header">
    <h1><i class="fas fa-basket-shopping" style="margin-right:8px;"></i>Какво има в хладилника ти?</h1>
    <p>Отбележи наличните продукти — планът ще се направи само с тях</p>
</div>

<!-- Sticky count bar -->
<div class="fp-bar">
    <div class="fp-bar-count">Избрани: <span id="totalCount">0</span> <span id="totalWord">продукта</span></div>
    <button class="btn-clear-all" onclick="clearAll()"><i class="fas fa-xmark" style="margin-right:4px;"></i>Изчисти всички</button>
</div>

<!-- Error banner -->
<div class="fp-error-banner" id="fpErrorBanner">
    <div class="fp-error-box" id="fpErrorBox"></div>
</div>

<!-- Category accordions -->
<div class="fp-content" id="fpContent"></div>

<!-- Debug JSON output (shown only with ?debug=1) -->
<div class="fp-debug" id="fpDebugWrap" style="display:none;">
    <div class="fp-debug-label"><i class="fas fa-code" style="margin-right:4px;"></i>Debug:</div>
    <pre class="fp-debug-box visible" id="debugBox"></pre>
</div>

<!-- Fixed submit bar -->
<div class="fp-submit-wrap">
    <button class="btn-submit" id="btnSubmit" onclick="handleSubmit()" disabled>
        <i class="fas fa-bolt"></i>
        <span>Генерирай план с избраните</span>
    </button>
</div>

<!-- Toast -->
<div class="fp-toast" id="fpToast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://aidiet.radilov-k.workers.dev';
const DEBUG_MODE = new URLSearchParams(window.location.search).get('debug') === '1';


const CATALOG = [
    {
        id: 'protein',
        icon: '🥩',
        label: 'Протеини',
        items: [
            'Пилешки гърди', 'Пилешко бутче', 'Пуешко филе', 'Говеждо (постно)',
            'Свинско (постно)', 'Яйца', 'Яйчни белтъци', 'Сьомга', 'Риба тон (консерва)',
            'Скумрия', 'Треска', 'Тилапия', 'Скариди', 'Тофу', 'Темпе',
            'Протеин (суроватка)', 'Протеин (растителен)'
        ]
    },
    {
        id: 'dairy',
        icon: '🥛',
        label: 'Млечни и яйца',
        items: [
            'Кисело мляко (2%)', 'Кисело мляко (0%)', 'Гръцко кисело мляко',
            'Извара (кварк)', 'Извара (нискомаслена)', 'Сирене', 'Кашкавал (нискомаслен)',
            'Рикота', 'Мляко (2%)', 'Растително мляко', 'Яйца'
        ]
    },
    {
        id: 'veggies',
        icon: '🥦',
        label: 'Зеленчуци',
        items: [
            'Броколи', 'Спанак', 'Зеле', 'Карфиол', 'Зелен фасул', 'Краставица',
            'Домат', 'Чери домати', 'Чушка', 'Морков', 'Целина', 'Тиквичка',
            'Патладжан', 'Праз', 'Лук', 'Чесън', 'Рукола', 'Маруля',
            'Аспержи', 'Гъби', 'Картофи (обикновени)', 'Сладки картофи (батат)'
        ]
    },
    {
        id: 'carbs',
        icon: '🌾',
        label: 'Въглехидрати и зърнени',
        items: [
            'Овесени ядки', 'Ориз (бял)', 'Ориз (кафяв)', 'Киноа',
            'Леща', 'Нахут', 'Черен боб', 'Бял боб', 'Елда',
            'Просо', 'Пълнозърнест хляб', 'Ръжен хляб', 'Тортила (пълнозърнеста)',
            'Картофи', 'Сладки картофи', 'Паста (пълнозърнеста)', 'Царевица'
        ]
    },
    {
        id: 'fats',
        icon: '🥑',
        label: 'Мазнини и ядки',
        items: [
            'Авокадо', 'Зехтин', 'Кокосово масло', 'Слънчогледово масло',
            'Бадеми', 'Орехи', 'Кашу', 'Лешници', 'Фъстъци',
            'Фъстъчено масло', 'Бадемово масло', 'Семена чиа', 'Ленено семе',
            'Тиквени семки', 'Слънчогледови семки'
        ]
    },
    {
        id: 'fruits',
        icon: '🍎',
        label: 'Плодове',
        items: [
            'Ябълка', 'Банан', 'Портокал', 'Мандарина', 'Ягоди',
            'Боровинки', 'Малини', 'Грозде', 'Праскова', 'Круша',
            'Киви', 'Ананас', 'Манго', 'Диня', 'Пъпеш',
            'Грейпфрут', 'Лимон'
        ]
    },
    {
        id: 'condiments',
        icon: '🫙',
        label: 'Подправки и добавки',
        items: [
            'Зехтин (за готвене)', 'Соев сос', 'Хумус', 'Горчица',
            'Лимонов сок', 'Оцет (ябълков)', 'Доматено пюре',
            'Кокосово мляко', 'Мед', 'Стевия', 'Канела',
            'Куркума', 'Джинджифил', 'Чили', 'Черен пипер'
        ]
    }
];

// ── State ──────────────────────────────────────────────────────────────────
const selected = {}; // { itemName: true }

// ── Build UI ───────────────────────────────────────────────────────────────
function buildUI() {
    const container = document.getElementById('fpContent');
    CATALOG.forEach(cat => {
        const details = document.createElement('details');
        details.className = 'fp-category';
        details.dataset.catId = cat.id;
        if (['protein', 'veggies', 'carbs'].includes(cat.id)) {
            details.open = true; // open most-used categories by default
        }

        // Summary
        const summary = document.createElement('summary');
        summary.innerHTML = `
            <span class="cat-icon">${cat.icon}</span>
            <span class="cat-label">${cat.label}</span>
            <span class="cat-badge" id="badge-${cat.id}" data-count="0">0</span>
            <i class="fas fa-chevron-down cat-chevron"></i>
        `;
        details.appendChild(summary);

        // Toolbar
        const toolbar = document.createElement('div');
        toolbar.className = 'cat-toolbar';
        toolbar.innerHTML = `
            <button class="btn-cat" onclick="selectAllInCat('${cat.id}')"><i class="fas fa-check-double" style="margin-right:4px;"></i>Избери всички</button>
            <button class="btn-cat" onclick="clearCat('${cat.id}')"><i class="fas fa-xmark" style="margin-right:4px;"></i>Изчисти</button>
        `;
        details.appendChild(toolbar);

        // Food grid
        const grid = document.createElement('div');
        grid.className = 'fp-foods';
        grid.id = `grid-${cat.id}`;

        cat.items.forEach(itemName => {
            const label = document.createElement('label');
            label.className = 'fp-item';
            label.dataset.cat = cat.id;
            label.dataset.item = itemName;
            label.innerHTML = `
                <input type="checkbox" value="${itemName}" onchange="onCheck(this)">
                <span class="fp-item-name">${itemName}</span>
            `;
            grid.appendChild(label);
        });

        details.appendChild(grid);
        container.appendChild(details);
    });
}

// ── Check / uncheck logic ──────────────────────────────────────────────────
function onCheck(checkbox) {
    const name = checkbox.value;
    const label = checkbox.closest('.fp-item');
    if (checkbox.checked) {
        selected[name] = true;
        label.classList.add('checked');
    } else {
        delete selected[name];
        label.classList.remove('checked');
    }
    const catId = label.dataset.cat;
    updateBadge(catId);
    updateTotal();
}

function updateBadge(catId) {
    const grid = document.getElementById(`grid-${catId}`);
    const count = grid.querySelectorAll('input:checked').length;
    const badge = document.getElementById(`badge-${catId}`);
    badge.textContent = count;
    badge.dataset.count = count;
}

function productWord(n) {
    return n === 1 ? 'продукт' : 'продукта';
}

function updateTotal() {
    const count = Object.keys(selected).length;
    document.getElementById('totalCount').textContent = count;
    document.getElementById('totalWord').textContent = productWord(count);
    document.getElementById('btnSubmit').disabled = count === 0;
}

function selectAllInCat(catId) {
    const grid = document.getElementById(`grid-${catId}`);
    grid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        if (!cb.checked) {
            cb.checked = true;
            selected[cb.value] = true;
            cb.closest('.fp-item').classList.add('checked');
        }
    });
    updateBadge(catId);
    updateTotal();
}

function clearCat(catId) {
    const grid = document.getElementById(`grid-${catId}`);
    grid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        if (cb.checked) {
            cb.checked = false;
            delete selected[cb.value];
            cb.closest('.fp-item').classList.remove('checked');
        }
    });
    updateBadge(catId);
    updateTotal();
}

function clearAll() {
    CATALOG.forEach(cat => clearCat(cat.id));
}

// ── Submit ─────────────────────────────────────────────────────────────────
async function handleSubmit() {
    const list = Object.keys(selected);
    if (list.length === 0) {
        showToast('Избери поне един продукт!', true);
        return;
    }

    hideError();
    setLoading(true, 'Запазване на продуктите…');

    try {
        // 1. Set the food mainlist in KV
        const setRes = await fetch(`${WORKER_URL}/api/admin/set-mainlist`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items: list })
        });
        if (!setRes.ok) {
            const errData = await setRes.json().catch(() => ({}));
            throw new Error(errData.error || `HTTP ${setRes.status}`);
        }

        setLoading(true, 'Активиране на списъка…');

        // 2. Enable the mainlist
        const enableRes = await fetch(`${WORKER_URL}/api/admin/set-mainlist-enabled`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled: true })
        });
        if (!enableRes.ok) {
            const errData = await enableRes.json().catch(() => ({}));
            throw new Error(errData.error || `HTTP ${enableRes.status}`);
        }

        // 3. Persist selection locally (for UI restore and debug)
        localStorage.setItem('userFoodList', JSON.stringify(list));

        if (DEBUG_MODE) {
            const debugWrap = document.getElementById('fpDebugWrap');
            const debugBox = document.getElementById('debugBox');
            debugBox.textContent = JSON.stringify({
                userFoodList: list,
                count: list.length,
                savedAt: new Date().toISOString(),
                apiCalls: [
                    `POST ${WORKER_URL}/api/admin/set-mainlist → OK`,
                    `POST ${WORKER_URL}/api/admin/set-mainlist-enabled → OK`
                ]
            }, null, 2);
            debugWrap.style.display = 'block';
        }

        setLoading(true, 'Пренасочване към въпросника…');

        // 4. Short delay so user sees the message, then redirect
        await new Promise(r => setTimeout(r, 700));
        window.location.href = 'questionnaire.html';

    } catch (err) {
        setLoading(false);
        showError(`Грешка при изпращане: ${err.message}. Провери връзката и опитай пак.`);
        showToast('Грешка — провери съобщението по-горе', true);
    }
}

// ── Loading state ──────────────────────────────────────────────────────────
function setLoading(active, text) {
    const overlay = document.getElementById('fpLoading');
    const btn = document.getElementById('btnSubmit');
    if (active) {
        document.getElementById('fpLoadingText').textContent = text || 'Зареждане…';
        overlay.classList.add('active');
        btn.disabled = true;
    } else {
        overlay.classList.remove('active');
        btn.disabled = Object.keys(selected).length === 0;
    }
}

// ── Error banner ───────────────────────────────────────────────────────────
function showError(msg) {
    const banner = document.getElementById('fpErrorBanner');
    const box = document.getElementById('fpErrorBox');
    box.textContent = msg;
    banner.classList.add('visible');
    banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function hideError() {
    document.getElementById('fpErrorBanner').classList.remove('visible');
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
    const t = document.getElementById('fpToast');
    t.textContent = msg;
    t.classList.toggle('error', isError);
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Restore from localStorage on load ─────────────────────────────────────
function restoreFromStorage() {
    try {
        const saved = JSON.parse(localStorage.getItem('userFoodList') || '[]');
        if (!Array.isArray(saved) || saved.length === 0) return;
        const allCheckboxes = document.querySelectorAll('.fp-item input[type="checkbox"]');
        const savedSet = new Set(saved);
        allCheckboxes.forEach(cb => {
            if (savedSet.has(cb.value)) {
                cb.checked = true;
                selected[cb.value] = true;
                cb.closest('.fp-item').classList.add('checked');
            }
        });
        CATALOG.forEach(cat => updateBadge(cat.id));
        updateTotal();
    } catch (e) {
        // ignore invalid localStorage data
    }
}

// ── Init ───────────────────────────────────────────────────────────────────
buildUI();
restoreFromStorage();
if (DEBUG_MODE) {
    document.getElementById('fpDebugWrap').style.display = 'block';
    document.getElementById('debugBox').textContent = 'Debug режим активен. Резултатът ще се покаже след изпращане.';
}
</script>
</body>
</html>
