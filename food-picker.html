        :root {
            --primary: #0D9488;
            --primary-dark: #0F766E;
            --primary-light: #CCFBF1;
            --accent: #06B6D4;
            --bg: #F0FDFA;
            --card-bg: rgba(255,255,255,0.82);
            --text-dark: #0F2F2E;
            --text-gray: #4b5563;
            --border: rgba(13,148,136,0.15);
            --shadow: 0 10px 30px rgba(13,148,136,0.12);
            --radius: 18px;
            --transition: all 0.25s cubic-bezier(0.25,0.8,0.25,1);
        }
        [data-theme="dark"] {
            --primary: #2DD4BF;
            --primary-dark: #0F766E;
            --primary-light: rgba(45,212,191,0.15);
            --accent: #22d3ee;
            --bg: #0a1f1e;
            --card-bg: rgba(15,47,46,0.85);
            --text-dark: #e2f8f5;
            --text-gray: #94a3b8;

            --shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 0 0 100px;
        }

        /* ── Header ── */
        .fp-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            padding: 28px 20px 24px;
            text-align: center;
        }
        .fp-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }
        .fp-header p {
            font-size: 0.9rem;
            opacity: 0.88;
            margin-top: 6px;
        }

        /* ── Sticky counter bar ── */
        .fp-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .fp-bar-count {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--primary);
        }
        .fp-bar-count span {
            font-size: 1.15rem;
            font-weight: 800;
        }
        .btn-clear-all {
            font-size: 0.8rem;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-gray);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-clear-all:hover { background: var(--primary-light); color: var(--primary); }

        /* ── Content ── */
        .fp-content {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Category accordion ── */
        .fp-category {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .fp-category summary {
            list-style: none;
            cursor: pointer;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1rem;
            user-select: none;
            transition: var(--transition);
        }
        .fp-category summary::-webkit-details-marker { display: none; }
        .fp-category summary:hover { background: var(--primary-light); }
        .fp-category[open] summary { border-bottom: 1px solid var(--border); }
        .cat-icon { font-size: 1.25rem; }
        .cat-label { flex: 1; }
        .cat-badge {
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--primary);
            color: #fff;
            border-radius: 12px;
            padding: 2px 8px;
            min-width: 22px;
            text-align: center;
        }
        .cat-badge[data-count="0"] { background: #d1d5db; }
        .cat-chevron {
            font-size: 0.75rem;
            color: var(--text-gray);
            transition: transform 0.25s;
        }
        .fp-category[open] .cat-chevron { transform: rotate(180deg); }

        /* ── Category toolbar ── */
        .cat-toolbar {
            display: flex;
            gap: 8px;
            padding: 10px 18px 8px;
            border-bottom: 1px solid var(--border);
        }
        .btn-cat {
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-gray);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-cat:hover, .btn-cat:focus { background: var(--primary-light); color: var(--primary); outline: none; }

        /* ── At-limit dimming: unchecked items when max foods reached ── */
        body.at-limit .fp-item:not(.checked) {
            opacity: 0.45;
            cursor: not-allowed;
        }
        body.at-limit .fp-item:not(.checked) input[type="checkbox"] {
            cursor: not-allowed;
        }
        /* Warning color for the counter when approaching/reaching the limit */
        .fp-bar-count.near-limit { color: #f59e0b; }
        .fp-bar-count.at-limit   { color: #ef4444; }

        /* ── Food grid ── */
        .fp-foods {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            padding: 12px 18px 16px;

        /* ── Checkbox item ── */
        .fp-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            user-select: none;

// ── Blocked foods helpers ───────────────────────────────────────────────────
/**
 * Returns true if a catalog item name should be hidden because it matches a
 * forbidden/blacklisted term.  Uses bidirectional substring matching so that
 * "Бял ориз" blocks "Ориз (бял)" and vice-versa.
 * Terms shorter than 3 characters are ignored to prevent false positives.
 *
 * Admin blacklist API response: { blacklist: Array<string | {item: string, mode: string}> }
 */
function isBlocked(itemName, blockedTerms) {
    const itemLower = itemName.toLowerCase();
    return blockedTerms.some(term => {
        if (term.length < 3) return false; // skip very short terms to avoid false positives
        const termLower = term.toLowerCase();
        return itemLower.includes(termLower) || termLower.includes(itemLower);
    });
}

/**
 * Collect blocked food names from:
 *   1. dietPlan.forbidden  – AI-generated forbidden list for this user's plan
 *   2. Admin blacklist fetched from the worker
 * Returns a flat string[] of all blocked terms (may contain duplicates; that's fine).
 */
async function loadBlockedFoods() {
    const blocked = [];

    // 1. Plan-level forbidden (synchronous – already in localStorage)
    try {
        const planStr = localStorage.getItem('dietPlan');
        if (planStr) {
            const plan = JSON.parse(planStr);
            if (Array.isArray(plan.forbidden)) {
                blocked.push(...plan.forbidden.map(f => String(f).trim()).filter(Boolean));
            }
        }
    } catch (e) {
        // ignore corrupt data
    }

    // 2. Admin blacklist (async)
    try {
        const blRes = await fetch(`${WORKER_URL}/api/admin/get-blacklist`);
        if (blRes.ok) {
            const blData = await blRes.json();
            if (Array.isArray(blData.blacklist)) {
                blData.blacklist.forEach(e => {
                    const name = typeof e === 'string' ? e : (e.item || '');
                    if (name) blocked.push(name.trim());
                });
            }
        }
    } catch (e) {
        // proceed without admin blacklist
    }

    return blocked;
}

// ── Custom items storage key ───────────────────────────────────────────────
const CUSTOM_KEY = 'userCustomFoods'; // { catId: [name, ...] }

function loadCustomItems() {
    try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || '{}'); }
    catch(e) { console.error('Failed to load custom foods:', e); return {}; }
}
function saveCustomItems(map) {
    localStorage.setItem(CUSTOM_KEY, JSON.stringify(map));
}

// Set of all known item names (lowercase) for O(1) duplicate detection
const knownItemsLower = new Set();

function initKnownItems() {
    CATALOG.forEach(c => c.items.forEach(n => knownItemsLower.add(n.toLowerCase())));
    const customMap = loadCustomItems();
    Object.values(customMap).forEach(arr => arr.forEach(n => knownItemsLower.add(n.toLowerCase())));
}

// ── Build UI ───────────────────────────────────────────────────────────────
function buildUI(blockedTerms = []) {
    const customMap = loadCustomItems();
    const container = document.getElementById('fpContent');
    CATALOG.forEach(cat => {
        // Merge predefined + custom items (custom come last)
        const customItems = customMap[cat.id] || [];
        const allItems = [...cat.items, ...customItems];

        // Filter out blocked items before rendering
        const visibleItems = blockedTerms.length
            ? allItems.filter(name => !isBlocked(name, blockedTerms))
            : allItems;

        // Skip the whole category if every item is blocked
        if (visibleItems.length === 0) return;

        const details = document.createElement('details');
        details.className = 'fp-category';
        details.dataset.catId = cat.id;
        if (['protein', 'veggies', 'carbs'].includes(cat.id)) {
            details.open = true; // open most-used categories by default
        }

        // Summary
        const summary = document.createElement('summary');
        summary.innerHTML = `
            <span class="cat-icon">${cat.icon}</span>
            <span class="cat-label">${cat.label}</span>
            <span class="cat-badge" id="badge-${cat.id}" data-count="0">0</span>
            <i class="fas fa-chevron-down cat-chevron"></i>
        `;
        details.appendChild(summary);

        // Toolbar
        const toolbar = document.createElement('div');
        toolbar.className = 'cat-toolbar';
        toolbar.innerHTML = `
            <button class="btn-cat" onclick="selectAllInCat('${cat.id}')"><i class="fas fa-check-double" style="margin-right:4px;"></i>Избери всички</button>
            <button class="btn-cat" onclick="clearCat('${cat.id}')"><i class="fas fa-xmark" style="margin-right:4px;"></i>Изчисти</button>
        `;
        details.appendChild(toolbar);

        // Food grid
        const grid = document.createElement('div');
        grid.className = 'fp-foods';
        grid.id = `grid-${cat.id}`;

        visibleItems.forEach(itemName => {
            grid.appendChild(createItemLabel(itemName, cat.id));
        });

        details.appendChild(grid);

        // Custom product add row
        const addWrap = document.createElement('div');
        addWrap.className = 'cat-add-wrap';

        const addInput = document.createElement('input');
        addInput.className = 'cat-add-input';
        addInput.id = `add-input-${cat.id}`;
        addInput.type = 'text';
        addInput.placeholder = 'Добави продукт…';
        addInput.maxLength = 80;
        addInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addCustomItem(cat.id);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'cat-add-btn';
        addBtn.innerHTML = '<i class="fas fa-plus"></i> Добави';
        addBtn.addEventListener('click', function() { addCustomItem(cat.id); });

        addWrap.appendChild(addInput);
        addWrap.appendChild(addBtn);
        details.appendChild(addWrap);

        container.appendChild(details);
    });
}

function createItemLabel(itemName, catId) {
    const label = document.createElement('label');
    label.className = 'fp-item';
    label.dataset.cat = catId;
    label.dataset.item = itemName;

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = itemName;
    cb.addEventListener('change', function() { onCheck(this); });

    const span = document.createElement('span');
    span.className = 'fp-item-name';
    span.textContent = itemName;

    label.appendChild(cb);
    label.appendChild(span);
    return label;
}

// ── Add custom item ────────────────────────────────────────────────────────
function addCustomItem(catId) {
    const input = document.getElementById(`add-input-${catId}`);
    const name = (input.value || '').trim();
    if (!name) return;

    // Check for duplicates using the pre-built Set (O(1) lookup)
    const nameLower = name.toLowerCase();
    if (knownItemsLower.has(nameLower)) {
        showToast(`„${name}" вече е в списъка.`, true);
        input.value = '';
        return;
    }

    // Save custom item
    const customMap = loadCustomItems();
    if (!customMap[catId]) customMap[catId] = [];
    customMap[catId].push(name);
    saveCustomItems(customMap);

    // Update the known-items set so subsequent checks are correct
    knownItemsLower.add(nameLower);

    // Add to grid
    const grid = document.getElementById(`grid-${catId}`);
    const label = createItemLabel(name, catId);
    grid.appendChild(label);

    // Auto-check the newly added item only if the limit allows it
    const cb = label.querySelector('input');
    if (Object.keys(selected).length < MAX_SELECTED_FOODS) {
        cb.checked = true;
        selected[name] = true;
        label.classList.add('checked');
    } else {
        showToast(`„${name}" добавен, но лимитът от ${MAX_SELECTED_FOODS} продукта е достигнат. Премахни друг, за да го включиш в плана.`, true);
    }
    updateBadge(catId);
    updateTotal();

    input.value = '';
    showToast(`„${name}" добавен!`, false);
}

// ── Check / uncheck logic ──────────────────────────────────────────────────
function onCheck(checkbox) {
    const name = checkbox.value;
    const label = checkbox.closest('.fp-item');
    if (checkbox.checked) {
        if (Object.keys(selected).length >= MAX_SELECTED_FOODS) {
            checkbox.checked = false;
            showToast(`Максимум ${MAX_SELECTED_FOODS} продукта. Премахни друг, за да добавиш нов.`, true);
            return;
        }
        selected[name] = true;
        label.classList.add('checked');
    } else {
        delete selected[name];
        label.classList.remove('checked');
    }
    const catId = label.dataset.cat;
    updateBadge(catId);
    updateTotal();
}

function updateBadge(catId) {
    const grid = document.getElementById(`grid-${catId}`);
    const count = grid.querySelectorAll('input:checked').length;
    const badge = document.getElementById(`badge-${catId}`);
    badge.textContent = count;
    badge.dataset.count = count;
}

function productWord(n) {
    return n === 1 ? 'продукт' : 'продукта';
}

function updateTotal() {
    const count = Object.keys(selected).length;
    document.getElementById('totalCount').textContent = count;
    document.getElementById('totalWord').textContent = productWord(count);
    document.getElementById('btnSubmit').disabled = count === 0;

    // Visual feedback for selection limit
    const atLimit  = count >= MAX_SELECTED_FOODS;
    const nearLimit = count >= MAX_SELECTED_FOODS - NEAR_LIMIT_THRESHOLD && !atLimit;
    document.body.classList.toggle('at-limit', atLimit);
    const bar = document.getElementById('fpBarCount');
    bar.classList.toggle('at-limit',   atLimit);
    bar.classList.toggle('near-limit', nearLimit);
}

function selectAllInCat(catId) {
    const grid = document.getElementById(`grid-${catId}`);
    let count = Object.keys(selected).length;
    let limited = false;
    grid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        if (!cb.checked) {
            if (count >= MAX_SELECTED_FOODS) { limited = true; return; }
            cb.checked = true;
            selected[cb.value] = true;
            cb.closest('.fp-item').classList.add('checked');
            count++;
        }
    });
    if (limited) {
        showToast(`Достигнат лимит от ${MAX_SELECTED_FOODS} продукта.`, true);
    }
    updateBadge(catId);
    updateTotal();
}

function clearCat(catId) {
    const grid = document.getElementById(`grid-${catId}`);
    grid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        if (cb.checked) {
            cb.checked = false;
            delete selected[cb.value];
            cb.closest('.fp-item').classList.remove('checked');
        }
    });
    updateBadge(catId);
    updateTotal();
}

function clearAll() {
    CATALOG.forEach(cat => clearCat(cat.id));
}

// ── Submit ─────────────────────────────────────────────────────────────────
async function handleSubmit() {
    const list = Object.keys(selected);
    if (list.length === 0) {
        showToast('Избери поне един продукт!', true);
        return;
    }

    // Demo mode check: limit plan generation to once
    if (!isDemoLimitUnlocked() && getDemoFoodPickerCount() >= DEMO_MAX_PLAN_GENERATIONS) {
        showDemoNotice(true);
        showToast('Демо лимит: само 1 генериране е позволено.', true);
        return;
    }

    hideError();
    setLoading(true, 'Проверка на продуктите…');

    try {
        // 0. Load all blocked terms (plan forbidden + admin blacklist) and filter
        const blockedTerms = await loadBlockedFoods();
        const filteredList = blockedTerms.length
            ? list.filter(item => !isBlocked(item, blockedTerms))
            : list;

        if (filteredList.length === 0) {
            setLoading(false);
            showError('Всички избрани продукти са в забранения списък. Моля, избери различни продукти.');
            return;
        }

        const removedCount = list.length - filteredList.length;
        if (removedCount > 0) {
            showToast(removedCount === 1
                ? '1 забранен продукт е изключен от плана.'
                : `${removedCount} забранени продукта са изключени от плана.`
            );
        }

        setLoading(true, 'Запазване на продуктите…');

        // 1. Set the food mainlist in KV (only non-blacklisted items)
        const setRes = await fetch(`${WORKER_URL}/api/admin/set-mainlist`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items: filteredList })
        });
        if (!setRes.ok) {
            const errData = await setRes.json().catch(() => ({}));
            throw new Error(errData.error || `HTTP ${setRes.status}`);
        }

        setLoading(true, 'Активиране на списъка…');

        // 2. Enable the mainlist
        const enableRes = await fetch(`${WORKER_URL}/api/admin/set-mainlist-enabled`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled: true })
        });
        if (!enableRes.ok) {
            const errData = await enableRes.json().catch(() => ({}));
            throw new Error(errData.error || `HTTP ${enableRes.status}`);
        }

        // 3. Persist selection locally (for UI restore and debug)
        localStorage.setItem('userFoodList', JSON.stringify(filteredList));

        if (DEBUG_MODE) {
            const debugWrap = document.getElementById('fpDebugWrap');
            const debugBox = document.getElementById('debugBox');
            debugBox.textContent = JSON.stringify({
                userFoodList: filteredList,
                removedBlocked: list.filter(i => isBlocked(i, blockedTerms)),
                count: filteredList.length,
                savedAt: new Date().toISOString()
            }, null, 2);
            debugWrap.style.display = 'block';
        }

        // 4. Check for existing user profile from questionnaire2
        const existingUserDataStr = localStorage.getItem('userData');
        if (existingUserDataStr) {
            // Re-generate plan using the existing profile and the new food selection
            const userData = JSON.parse(existingUserDataStr);
            setLoading(true, 'Генериране на план с избраните продукти…', 'Това може да отнеме до няколко минути');

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), PLAN_GENERATION_TIMEOUT_MS);

            const planRes = await fetch(`${WORKER_URL}/api/generate-plan`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData),
                signal: controller.signal
            });
            clearTimeout(timeoutId);

            if (!planRes.ok) {
                const errData = await planRes.json().catch(() => ({}));
                throw new Error(errData.error || `HTTP ${planRes.status}`);
            }

            const result = await planRes.json();
            if (!result.success) {
                throw new Error(result.error || 'Грешка при генериране на плана');
            }

            // Save the new plan
            localStorage.setItem('dietPlan', JSON.stringify(result.plan));
            if (result.userId) {
                localStorage.setItem('userId', result.userId);
            }
            localStorage.removeItem('hasSeenPlanJustification');

            // Demo: increment plan generation counter
            incrementDemoFoodPickerCount();

            setLoading(true, 'Пренасочване към плана…');
            await new Promise(r => setTimeout(r, 700));
            window.location.href = 'plan.html';

        } else {
            // No existing profile — redirect to questionnaire so the user can fill it in
            setLoading(true, 'Пренасочване към въпросника…');
            await new Promise(r => setTimeout(r, 700));
            window.location.href = 'questionnaire.html';
        }

    } catch (err) {
        setLoading(false);
        showError(`Грешка при изпращане: ${err.message}. Провери връзката и опитай пак.`);
        showToast('Грешка — провери съобщението по-горе', true);
    }
}

// ── Loading state ──────────────────────────────────────────────────────────
function setLoading(active, text, sub) {
    const overlay = document.getElementById('fpLoading');
    const btn = document.getElementById('btnSubmit');
    if (active) {
        document.getElementById('fpLoadingText').textContent = text || 'Зареждане…';
        const subEl = document.getElementById('fpLoadingSub');
        if (subEl) subEl.textContent = sub !== undefined ? sub : 'Моля, изчакай';
        overlay.classList.add('active');
        btn.disabled = true;
    } else {
        overlay.classList.remove('active');
        btn.disabled = Object.keys(selected).length === 0;
    }
}

// ── Error banner ───────────────────────────────────────────────────────────
function showError(msg) {
    const banner = document.getElementById('fpErrorBanner');
    const box = document.getElementById('fpErrorBox');
    box.textContent = msg;
    banner.classList.add('visible');
    banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function hideError() {
    document.getElementById('fpErrorBanner').classList.remove('visible');
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
    const t = document.getElementById('fpToast');
    t.textContent = msg;
    t.classList.toggle('error', isError);
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Restore from localStorage on load ─────────────────────────────────────
function restoreFromStorage() {
    try {
        const saved = JSON.parse(localStorage.getItem('userFoodList') || '[]');
        if (!Array.isArray(saved) || saved.length === 0) return;
        const allCheckboxes = document.querySelectorAll('.fp-item input[type="checkbox"]');
        const savedSet = new Set(saved);
        allCheckboxes.forEach(cb => {
            if (savedSet.has(cb.value)) {
                cb.checked = true;
                selected[cb.value] = true;
                cb.closest('.fp-item').classList.add('checked');
            }
        });
        CATALOG.forEach(cat => updateBadge(cat.id));
        updateTotal();
    } catch (e) {
        // ignore invalid localStorage data
    }
}

// ── Init ───────────────────────────────────────────────────────────────────
(async function init() {
    initKnownItems();
    const blockedTerms = await loadBlockedFoods();
    buildUI(blockedTerms);
    restoreFromStorage();

    // Show demo notice on load
    if (!isDemoLimitUnlocked()) {
        const limitReached = getDemoFoodPickerCount() >= DEMO_MAX_PLAN_GENERATIONS;
        showDemoNotice(limitReached);
    }

    if (DEBUG_MODE) {
        document.getElementById('fpDebugWrap').style.display = 'block';
        document.getElementById('debugBox').textContent = blockedTerms.length
            ? `Debug режим активен.\nБлокирани продукти (${blockedTerms.length}): ${blockedTerms.join(', ')}\n\nРезултатът ще се покаже след изпращане.`
            : 'Debug режим активен. Резултатът ще се покаже след изпращане.';
    }
})();
</script>
