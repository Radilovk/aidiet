<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XBody Ability</title>
    
    <link rel="manifest" href="xbody-manifest.json">
    <meta name="theme-color" content="#ff0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="XBody">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff; /* Бял фон */
            overflow-y: auto; /* Позволява скролване на графика */
            -webkit-overflow-scrolling: touch;
        }
        iframe {
            width: 100%;
            min-height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe src="https://app.acuityscheduling.com/schedule.php?owner=13943721&appointmentType=16859189" 
            allow="payment" 
            frameBorder="0">
    </iframe>
    
    <script src="https://embed.acuityscheduling.com/js/embed.js" type="text/javascript"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('xbody-sw.js');
            });
        }
    </script>
</body>
</html>
