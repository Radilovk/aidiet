<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Widget Pro - Circular</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #1a1f2b 0%, #0b0e14 100%);
        }

        .widget-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .header h3 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.3);
            margin: 0 0 10px 0;
        }

        .percentage-display {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        /* Контейнер за визуализацията */
        .viz-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Слоеве на SVG */
        .viz-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg); /* За да започва кръга от 12 часа */
        }

        .silhouette-svg {
            position: absolute;
            width: 60%; /* Намаляваме силуета, за да влезе в кръга */
            height: auto;
            z-index: 2;
        }

        /* Плъзгач */
        .slider-wrapper {
            margin-top: 40px;
        }

        input[type=range] {
            width: 100%;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="widget-card" id="card">
    <div class="header">
        <h3>Здраве</h3>
        <div class="percentage-display" id="percDisplay">0%</div>
    </div>

    <div class="viz-container">
        <!-- SVG за кръга -->
        <svg class="viz-svg" viewBox="0 0 100 100">
            <!-- Фонова окръжност -->
            <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4" />
            <!-- Прогрес окръжност -->
            <circle id="progressRing" cx="50" cy="50" r="45" fill="none" 
                    stroke="url(#ringGrad)" stroke-width="4" stroke-linecap="round"
                    stroke-dasharray="282.7" stroke-dashoffset="282.7" />
            
            <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop id="ringColor" offset="0%" stop-color="#ff3e3e" />
                </linearGradient>
            </defs>
        </svg>

        <!-- Силуетът (центриран вътре) -->
        <svg class="silhouette-svg" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="healthGrad" x1="0" y1="512" x2="0" y2="0" gradientUnits="userSpaceOnUse">
                    <stop id="fillStop" offset="0%" stop-color="#ff3e3e" />
                    <stop id="emptyStop" offset="0%" stop-color="rgba(255,255,255,0.08)" />
                </linearGradient>
            </defs>
            <g fill="url(#healthGrad)">
                <circle cx="256" cy="56" r="40"></circle>
                <path d="M199.3,295.62h0l-30.4,172.2a24,24,0,0,0,19.5,27.8,23.76,23.76,0,0,0,27.6-19.5l21-119.9v.2s5.2-32.5,17.5-32.5h3.1c12.5,0,17.5,32.5,17.5,32.5v-.1l21,119.9a23.92,23.92,0,1,0,47.1-8.4l-30.4-172.2-4.9-29.7c-2.9-18.1-4.2-47.6.5-59.7,4-10.4,14.13-14.2,23.2-14.2H424a24,24,0,0,0,0-48H88a24,24,0,0,0,0,48h92.5c9.23,0,19.2,3.8,23.2,14.2,4.7,12.1,3.4,41.6.5,59.7Z"></path>
            </g>
        </svg>
    </div>

    <div class="slider-wrapper">
        <input type="range" id="slider" min="0" max="100" value="0">
    </div>
</div>

<script>
    const slider = document.getElementById('slider');
    const progressRing = document.getElementById('progressRing');
    const fillStop = document.getElementById('fillStop');
    const emptyStop = document.getElementById('emptyStop');
    const ringColor = document.getElementById('ringColor');
    const percDisplay = document.getElementById('percDisplay');
    const card = document.getElementById('card');

    // Цветова гама
    const colors = [
        { p: 0,   r: 255, g: 62,  b: 62 },  // Червено
        { p: 25,  r: 255, g: 140, b: 0 },   // Оранжево
        { p: 50,  r: 255, g: 215, b: 0 },   // Жълто
        { p: 75,  r: 62,  g: 255, b: 120 }, // Зелено
        { p: 100, r: 62,  g: 180, b: 255 }  // Синьо
    ];

    function getColor(percent) {
        let s = colors[0], e = colors[colors.length-1];
        for(let i=0; i<colors.length-1; i++) {
            if(percent >= colors[i].p && percent <= colors[i+1].p) {
                s = colors[i]; e = colors[i+1]; break;
            }
        }
        const f = (percent - s.p) / (e.p - s.p || 1);
        const r = Math.round(s.r + f*(e.r - s.r));
        const g = Math.round(s.g + f*(e.g - s.g));
        const b = Math.round(s.b + f*(e.b - s.b));
        return `rgb(${r},${g},${b})`;
    }

    function update() {
        const val = parseInt(slider.value);
        const color = getColor(val);
        
        // 1. Обновяване на текста
        percDisplay.innerText = val + '%';
        percDisplay.style.color = color;

        // 2. Обновяване на тялото
        fillStop.setAttribute('offset', val + '%');
        emptyStop.setAttribute('offset', val + '%');
        fillStop.setAttribute('stop-color', color);

        // 3. Кръгов прогрес (периметърът е 2 * PI * r = 2 * 3.1415 * 45 ≈ 282.7)
        const circumference = 282.7;
        const offset = circumference - (val / 100) * circumference;
        progressRing.style.strokeDashoffset = offset;
        ringColor.setAttribute('stop-color', color);

        // 4. Ефекти на картата
        card.style.boxShadow = `0 40px 100px -20px ${color.replace('rgb', 'rgba').replace(')', ', 0.2)')}`;
        card.style.borderColor = color.replace('rgb', 'rgba').replace(')', ', 0.2)');
    }

    slider.addEventListener('input', update);
    update();
</script>

</body>
</html>
