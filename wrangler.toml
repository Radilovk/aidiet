name = "aidiet"
main = "worker.js"
compatibility_date = "2024-01-01"

# Default configuration (used when no environment is specified)
# For this project, we prefer explicit environments [env.staging] and [env.production]

[env.staging]
name = "aidiet-staging"

[[env.staging.kv_namespaces]]
binding = "page_content"
id = "81fc0991b2764918b682f9ca170abd4b"

# Queue bindings for staging environment (separate queue to avoid consumer conflict)
[[env.staging.queues.producers]]
  queue = "plan-generation-staging"
  binding = "PLAN_QUEUE"

[[env.staging.queues.consumers]]
  queue = "plan-generation-staging"
  max_batch_size = 1
  max_batch_timeout = 1
  max_retries = 3
  visibility_timeout_ms = 900000

[env.production]
name = "aidiet"
route = "aidiet.radilov-k.workers.dev/*"

[[env.production.kv_namespaces]]
binding = "page_content"
id = "81fc0991b2764918b682f9ca170abd4b"

# Queue bindings for production environment
[[env.production.queues.producers]]
  queue = "plan-generation"
  binding = "PLAN_QUEUE"

[[env.production.queues.consumers]]
  queue = "plan-generation"
  max_batch_size = 1
  max_batch_timeout = 1
  max_retries = 3
  visibility_timeout_ms = 900000
