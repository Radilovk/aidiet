name = "aidiet-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV Namespace binding
[[kv_namespaces]]
binding = "page_content"
id = "81fc0991b2764918b682f9ca170abd4b"

# Cron triggers for scheduled push notifications are disabled.
# Push notifications are handled client-side via local-scheduler.js.
# Re-enable by uncommenting the section below when server-side push is needed.
# [triggers]
# crons = ["0 * * * *"]

# Environment variables for API keys (configure via wrangler secret)
# Run: wrangler secret put OPENAI_API_KEY
# Run: wrangler secret put GEMINI_API_KEY

[env.production]
name = "aidiet-worker"
route = "aidiet.radilov-k.workers.dev/*"

[[env.production.kv_namespaces]]
binding = "page_content"
id = "81fc0991b2764918b682f9ca170abd4b"

[env.production.triggers]
# crons = ["0 * * * *"]  # Disabled – notifications handled client-side
